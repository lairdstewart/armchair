# Server port (Koyeb sets PORT; Makefile overrides locally)
server.port=${PORT:8080}

# Trust X-Forwarded-* headers from reverse proxy (Koyeb) so Spring constructs
# correct public URLs for OAuth redirects and request-based URL building.
server.forward-headers-strategy=framework

# Database Configuration (secrets from environment variables)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Automatically create new database tables and/or columns based on Java entities
spring.jpa.hibernate.ddl-auto=update

# Google OAuth2 Configuration (secrets from environment variables)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid

# GitHub OAuth2 Configuration (secrets from environment variables)
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=

# Microsoft OAuth2 Configuration (Azure AD, personal accounts via /consumers/ tenant)
spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET}
spring.security.oauth2.client.registration.microsoft.scope=openid
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.microsoft.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.microsoft.authorization-uri=https://login.microsoftonline.com/consumers/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.microsoft.token-uri=https://login.microsoftonline.com/consumers/oauth2/v2.0/token
spring.security.oauth2.client.provider.microsoft.jwk-set-uri=https://login.microsoftonline.com/consumers/discovery/v2.0/keys
spring.security.oauth2.client.provider.microsoft.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.microsoft.user-name-attribute=sub

# File upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Fix "cached plan must not change result type" error with PostgreSQL + Hibernate ddl-auto=update
spring.datasource.hikari.data-source-properties.autosave=conservative

# Session: 2-hour timeout, cookie-only tracking (no ;jsessionid in URLs)
server.servlet.session.timeout=2h
server.servlet.session.tracking-modes=cookie

# OAuth2 debug logging (token exchange requests/responses)
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.web.client.RestTemplate=DEBUG
