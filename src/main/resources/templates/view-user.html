<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <script th:src="@{/js/cover-fallback.js}"></script>
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="page-content">
    <h2 th:text="${viewUsername}"></h2>

    <div th:if="${hasFiction || hasNonfiction}">
      <!-- Type selector radio buttons -->
      <div th:if="${hasFiction && hasNonfiction}" style="margin-bottom: 15px;">
        <label>
          <input type="radio" name="typeSelector" value="fiction" checked onchange="document.getElementById('fiction-list').style.display='block'; document.getElementById('nonfiction-list').style.display='none';" />
          Fiction
        </label>
        <label style="margin-left: 15px;">
          <input type="radio" name="typeSelector" value="nonfiction" onchange="document.getElementById('fiction-list').style.display='none'; document.getElementById('nonfiction-list').style.display='block';" />
          Non-Fiction
        </label>
      </div>
      <div th:if="${hasFiction && !hasNonfiction}" style="margin-bottom: 15px;">
        <label>
          <input type="radio" name="typeSelector" value="fiction" checked disabled />
          Fiction
        </label>
      </div>
      <div th:if="${!hasFiction && hasNonfiction}" style="margin-bottom: 15px;">
        <label>
          <input type="radio" name="typeSelector" value="nonfiction" checked disabled />
          Non-Fiction
        </label>
      </div>

      <!-- Fiction books list -->
      <div id="fiction-list" th:if="${hasFiction}" th:style="${hasNonfiction} ? 'display: block;' : ''">
        <ol class="book-list">
          <li th:each="rb : ${fictionRankedBooks}">
            <span th:class="'book-number ' + ${rb.categoryClass()}" th:text="${rb.rankDisplay()}"></span>
            <th:block th:replace="~{fragments :: bookEntry(${rb.book()}, ~{:: .fiction-actions})}">
              <span class="fiction-actions" th:remove="tag">
                <form th:if="${rb.book().workOlid() != null && !userBooks.containsKey(rb.book().workOlid())}" th:action="@{/add-to-reading-list}" method="POST" style="display: inline;">
                  <input type="hidden" name="workOlid" th:value="${rb.book().workOlid()}" />
                  <input type="hidden" name="bookName" th:value="${rb.book().title()}" />
                  <input type="hidden" name="author" th:value="${rb.book().author()}" />
                  <input type="hidden" name="editionOlid" th:value="${rb.book().editionOlid()}" />
                  <input type="hidden" name="returnUrl" th:value="${'/user/' + viewUsername}" />
                  <button type="submit" class="book-action-link">want to read</button>
                </form>
              </span>
            </th:block>
          </li>
        </ol>
      </div>

      <!-- Non-Fiction books list -->
      <div id="nonfiction-list" th:if="${hasNonfiction}" th:style="${hasFiction} ? 'display: none;' : ''">
        <ol class="book-list">
          <li th:each="rb : ${nonfictionRankedBooks}">
            <span th:class="'book-number ' + ${rb.categoryClass()}" th:text="${rb.rankDisplay()}"></span>
            <th:block th:replace="~{fragments :: bookEntry(${rb.book()}, ~{:: .nonfiction-actions})}">
              <span class="nonfiction-actions" th:remove="tag">
                <form th:if="${rb.book().workOlid() != null && !userBooks.containsKey(rb.book().workOlid())}" th:action="@{/add-to-reading-list}" method="POST" style="display: inline;">
                  <input type="hidden" name="workOlid" th:value="${rb.book().workOlid()}" />
                  <input type="hidden" name="bookName" th:value="${rb.book().title()}" />
                  <input type="hidden" name="author" th:value="${rb.book().author()}" />
                  <input type="hidden" name="editionOlid" th:value="${rb.book().editionOlid()}" />
                  <input type="hidden" name="returnUrl" th:value="${'/user/' + viewUsername}" />
                  <button type="submit" class="book-action-link">want to read</button>
                </form>
              </span>
            </th:block>
          </li>
        </ol>
      </div>
    </div>

    <p th:if="${!hasFiction && !hasNonfiction}"><em>No books yet.</em></p>
    </div>
    <script th:src="@{/js/review-toggle.js}"></script>
  </body>
</html>
