<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <script th:src="@{/js/cover-fallback.js}"></script>
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="page-content">
    <h2 th:text="${viewUsername}"></h2>

    <div th:if="${hasFiction || hasNonfiction || hasWantToRead}">
      <script th:inline="javascript">
        function showTab(tab) {
          document.querySelectorAll('.profile-tab').forEach(function(el) { el.style.display = 'none'; });
          var el = document.getElementById(tab + '-list');
          if (el) el.style.display = 'block';
        }
      </script>

      <!-- Type selector radio buttons -->
      <div style="margin-bottom: 15px;">
        <th:block th:if="${hasFiction}">
          <label>
            <input type="radio" name="typeSelector" value="fiction" checked onchange="showTab('fiction')" />
            Fiction
          </label>
        </th:block>
        <th:block th:if="${hasNonfiction}">
          <label th:style="${hasFiction} ? 'margin-left: 15px;' : ''">
            <input type="radio" name="typeSelector" value="nonfiction"
                   th:checked="${!hasFiction}" onchange="showTab('nonfiction')" />
            Non-Fiction
          </label>
        </th:block>
        <th:block th:if="${hasWantToRead}">
          <label th:style="${hasFiction || hasNonfiction} ? 'margin-left: 15px;' : ''">
            <input type="radio" name="typeSelector" value="wanttoread"
                   th:checked="${!hasFiction && !hasNonfiction}" onchange="showTab('wanttoread')" />
            Want to Read
          </label>
        </th:block>
      </div>

      <!-- Fiction books list -->
      <div id="fiction-list" class="profile-tab" th:if="${hasFiction}" style="display: block;">
        <ol class="book-list">
          <li th:each="rb : ${fictionRankedBooks}">
            <span th:class="'book-number ' + ${rb.categoryClass()}" th:text="${rb.rankDisplay()}"></span>
            <th:block th:replace="~{fragments :: bookEntry(${rb.book()}, null, true, true)}" />
          </li>
        </ol>
      </div>

      <!-- Non-Fiction books list -->
      <div id="nonfiction-list" class="profile-tab" th:if="${hasNonfiction}" th:style="${hasFiction} ? 'display: none;' : 'display: block;'">
        <ol class="book-list">
          <li th:each="rb : ${nonfictionRankedBooks}">
            <span th:class="'book-number ' + ${rb.categoryClass()}" th:text="${rb.rankDisplay()}"></span>
            <th:block th:replace="~{fragments :: bookEntry(${rb.book()}, null, true, true)}" />
          </li>
        </ol>
      </div>

      <!-- Want to Read books list -->
      <div id="wanttoread-list" class="profile-tab" th:if="${hasWantToRead}" th:style="${hasFiction || hasNonfiction} ? 'display: none;' : 'display: block;'">
        <ul class="book-list">
          <li th:each="book : ${wantToReadBooks}">
            <span class="book-number-spacer"></span>
            <th:block th:replace="~{fragments :: bookEntry(${book}, null, true, true)}" />
          </li>
        </ul>
      </div>
    </div>

    <p th:if="${!hasFiction && !hasNonfiction && !hasWantToRead}"><em>No books yet.</em></p>
    </div>
    <script th:src="@{/js/review-toggle.js}"></script>
  </body>
</html>
