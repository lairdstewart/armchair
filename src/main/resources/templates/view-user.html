<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <script th:src="@{/js/cover-fallback.js}"></script>
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="page-content">
    <h2 th:text="${viewUsername}"></h2>

    <div th:if="${hasFiction || hasNonfiction}">
      <!-- Type selector radio buttons -->
      <div th:if="${hasFiction && hasNonfiction}" style="margin-bottom: 15px;">
        <label>
          <input type="radio" name="typeSelector" value="fiction" checked onchange="document.getElementById('fiction-list').style.display='block'; document.getElementById('nonfiction-list').style.display='none';" />
          Fiction
        </label>
        <label style="margin-left: 15px;">
          <input type="radio" name="typeSelector" value="nonfiction" onchange="document.getElementById('fiction-list').style.display='none'; document.getElementById('nonfiction-list').style.display='block';" />
          Non-Fiction
        </label>
      </div>
      <div th:if="${hasFiction && !hasNonfiction}" style="margin-bottom: 15px;">
        <label>
          <input type="radio" name="typeSelector" value="fiction" checked disabled />
          Fiction
        </label>
      </div>
      <div th:if="${!hasFiction && hasNonfiction}" style="margin-bottom: 15px;">
        <label>
          <input type="radio" name="typeSelector" value="nonfiction" checked disabled />
          Non-Fiction
        </label>
      </div>

      <!-- Fiction books list -->
      <div id="fiction-list" th:if="${hasFiction}" th:style="${hasNonfiction} ? 'display: block;' : ''">
        <ol class="book-list">
          <li th:each="book, iter : ${fictionBooks.liked()}">
            <span class="book-number liked" th:text="${iter.index + 1}"></span>
            <span th:if="${book.review() == null}">
              <div class="book-entry">
                <div class="book-info">
                  <div class="book-title">
                    <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                    <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                  </div>
                  <div th:if="${book.author() != null && !book.author().isBlank()}" class="book-author"><span th:text="${book.author()}"></span><span th:if="${book.firstPublishYear() != null}" th:text="${' (' + book.firstPublishYear() + ')'}"></span></div>
                  <form th:if="${book.workOlid() != null && !userBooks.containsKey(book.workOlid())}" th:action="@{/add-to-reading-list}" method="POST" style="display: inline; margin-left: 0.5em;">
                    <input type="hidden" name="workOlid" th:value="${book.workOlid()}" />
                    <input type="hidden" name="bookName" th:value="${book.title()}" />
                    <input type="hidden" name="author" th:value="${book.author()}" />
                    <input type="hidden" name="editionOlid" th:value="${book.editionOlid()}" />
                    <input type="hidden" name="returnUrl" th:value="${'/user/' + viewUsername}" />
                    <button type="submit" class="book-action-link">[want to read]</button>
                  </form>
                </div>
                <img th:if="${book.coverUrl() != null}" class="book-cover" th:src="${book.coverUrl()}" /><div th:if="${book.coverUrl() == null}" class="book-cover-placeholder">?</div>
              </div>
            </span>
            <details th:if="${book.review() != null}" class="book-review">
              <summary>
                <div class="book-entry">
                  <div class="book-info">
                    <div class="book-title">
                      <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                      <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                    </div>
                    <div th:if="${book.author() != null && !book.author().isBlank()}" class="book-author"><span th:text="${book.author()}"></span><span th:if="${book.firstPublishYear() != null}" th:text="${' (' + book.firstPublishYear() + ')'}"></span></div>
                    <span class="book-actions">
                      <span class="review-toggle"></span>
                      <form th:if="${book.workOlid() != null && !userBooks.containsKey(book.workOlid())}" th:action="@{/add-to-reading-list}" method="POST" style="display: inline; margin-left: 0.5em;">
                        <input type="hidden" name="workOlid" th:value="${book.workOlid()}" />
                        <input type="hidden" name="bookName" th:value="${book.title()}" />
                        <input type="hidden" name="author" th:value="${book.author()}" />
                        <input type="hidden" name="editionOlid" th:value="${book.editionOlid()}" />
                        <input type="hidden" name="returnUrl" th:value="${'/user/' + viewUsername}" />
                        <button type="submit" class="book-action-link">[want to read]</button>
                      </form>
                    </span>

                  <img th:if="${book.coverUrl() != null}" class="book-cover" th:src="${book.coverUrl()}" /><div th:if="${book.coverUrl() == null}" class="book-cover-placeholder">?</div>
                </div>
              </summary>
              <div class="review-text" th:text="${book.review()}"></div>
            </details>

                      <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                      <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                    </div>
                    <div th:if="${book.author() != null && !book.author().isBlank()}" class="book-author"><span th:text="${book.author()}"></span><span th:if="${book.firstPublishYear() != null}" th:text="${' (' + book.firstPublishYear() + ')'}"></span></div>
                    <span class="book-actions">
                      <span class="review-toggle"></span>
                      <form th:if="${book.workOlid() != null && !userBooks.containsKey(book.workOlid())}" th:action="@{/add-to-reading-list}" method="POST" style="display: inline; margin-left: 0.5em;">
                        <input type="hidden" name="workOlid" th:value="${book.workOlid()}" />
                        <input type="hidden" name="bookName" th:value="${book.title()}" />
                        <input type="hidden" name="author" th:value="${book.author()}" />
                        <input type="hidden" name="editionOlid" th:value="${book.editionOlid()}" />
                        <input type="hidden" name="returnUrl" th:value="${'/user/' + viewUsername}" />
                        <button type="submit" class="book-action-link">[want to read]</button>
                      </form>
                    </span>
                  </div>
                  <img th:if="${book.coverUrl() != null}" class="book-cover" th:src="${book.coverUrl()}" /><div th:if="${book.coverUrl() == null}" class="book-cover-placeholder">?</div>
                </div>
              </summary>
              <div class="review-text" th:text="${book.review()}"></div>
            </details>
          </li>
          <li th:each="book : ${nonfictionBooks.unranked()}">
            <span class="book-number unranked">?</span>
            <span th:if="${book.review() == null}">
              <div class="book-entry">
                <div class="book-info">
                  <div class="book-title">
                    <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                    <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                  </div>
                  <div th:if="${book.author() != null && !book.author().isBlank()}" class="book-author"><span th:text="${book.author()}"></span><span th:if="${book.firstPublishYear() != null}" th:text="${' (' + book.firstPublishYear() + ')'}"></span></div>
                  <form th:if="${book.workOlid() != null && !userBooks.containsKey(book.workOlid())}" th:action="@{/add-to-reading-list}" method="POST" style="display: inline; margin-left: 0.5em;">
                    <input type="hidden" name="workOlid" th:value="${book.workOlid()}" />
                    <input type="hidden" name="bookName" th:value="${book.title()}" />
                    <input type="hidden" name="author" th:value="${book.author()}" />
                    <input type="hidden" name="editionOlid" th:value="${book.editionOlid()}" />
                    <input type="hidden" name="returnUrl" th:value="${'/user/' + viewUsername}" />
                    <button type="submit" class="book-action-link">[want to read]</button>
                  </form>
                </div>
                <img th:if="${book.coverUrl() != null}" class="book-cover" th:src="${book.coverUrl()}" /><div th:if="${book.coverUrl() == null}" class="book-cover-placeholder">?</div>
              </div>
            </span>
            <details th:if="${book.review() != null}" class="book-review">
              <summary>
                <div class="book-entry">
                  <div class="book-info">
                    <div class="book-title">
                      <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                      <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                    </div>
                    <div th:if="${book.author() != null && !book.author().isBlank()}" class="book-author"><span th:text="${book.author()}"></span><span th:if="${book.firstPublishYear() != null}" th:text="${' (' + book.firstPublishYear() + ')'}"></span></div>
                    <span class="book-actions">
                      <span class="review-toggle"></span>
                      <form th:if="${book.workOlid() != null && !userBooks.containsKey(book.workOlid())}" th:action="@{/add-to-reading-list}" method="POST" style="display: inline; margin-left: 0.5em;">
                        <input type="hidden" name="workOlid" th:value="${book.workOlid()}" />
                        <input type="hidden" name="bookName" th:value="${book.title()}" />
                        <input type="hidden" name="author" th:value="${book.author()}" />
                        <input type="hidden" name="editionOlid" th:value="${book.editionOlid()}" />
                        <input type="hidden" name="returnUrl" th:value="${'/user/' + viewUsername}" />
                        <button type="submit" class="book-action-link">[want to read]</button>
                      </form>
                    </span>
                  </div>
                  <img th:if="${book.coverUrl() != null}" class="book-cover" th:src="${book.coverUrl()}" /><div th:if="${book.coverUrl() == null}" class="book-cover-placeholder">?</div>
                </div>
              </summary>
              <div class="review-text" th:text="${book.review()}"></div>
            </details>
          </li>
        </ol>
      </div>
    </div>

    <p th:if="${!hasFiction && !hasNonfiction}"><em>No books yet.</em></p>
    </div>
  </body>
</html>
