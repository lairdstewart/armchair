<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title th:text="${isCurated} ? ${viewUsername} : |${viewUsername}'s Books|">User's Books</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <form th:action="${isCurated} ? @{/curated} : @{/explore}" method="GET" style="margin-bottom: 10px;">
      <button type="submit">Back</button>
    </form>
    <h2 th:text="${isCurated} ? ${viewUsername} : |${viewUsername}'s Books|"></h2>

    <div th:replace="~{fragments :: bookLists(${fictionBooks}, ${nonfictionBooks}, ${viewUsername}, ${!isCurated})}"></div>

    <p th:if="${fictionBooks.liked().isEmpty() && fictionBooks.ok().isEmpty() && fictionBooks.disliked().isEmpty() && nonfictionBooks.liked().isEmpty() && nonfictionBooks.ok().isEmpty() && nonfictionBooks.disliked().isEmpty()}">No books yet.</p>
  </body>
</html>
