<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="page-content">
      <a th:href="@{/search(type='books', query=${searchQuery})}" class="btn-back">back to search</a>
      <h3>Add <span th:text="${title}" th:remove="tag"></span> to library</h3>
      <form th:action="@{/save-add-book}" method="POST">
        <input type="hidden" name="workOlid" th:value="${workOlid}" />
        <input type="hidden" name="title" th:value="${title}" />
        <input type="hidden" name="author" th:value="${author}" />
        <input type="hidden" name="coverId" th:value="${coverId}" />
        <input type="hidden" name="firstPublishYear" th:value="${firstPublishYear}" />
        <input type="hidden" name="searchQuery" th:value="${searchQuery}" />
        <div style="margin-bottom: 15px;">
          <label><input type="radio" name="bookshelf" value="fiction" checked onchange="toggleCategory(false)" /> Fiction</label>
          <label style="margin-left: 15px;"><input type="radio" name="bookshelf" value="nonfiction" onchange="toggleCategory(false)" /> Non-Fiction</label>
          <label style="margin-left: 15px;"><input type="radio" name="bookshelf" value="want-to-read" onchange="toggleCategory(true)" /> Want to Read</label>
        </div>
        <div id="category-group" style="margin-bottom: 15px;">
          <label><input type="radio" name="category" value="liked" checked /> liked it</label>
          <label style="margin-left: 15px;"><input type="radio" name="category" value="ok" /> it was ok</label>
          <label style="margin-left: 15px;"><input type="radio" name="category" value="disliked" /> didn't like it</label>
        </div>
        <div style="margin-bottom: 15px;">
          <label for="review">Review (optional):</label><br />
          <textarea id="review" name="review" rows="4" cols="50" maxlength="5000" placeholder="Write your thoughts about this book..."></textarea>
        </div>
        <button type="submit" class="btn">Save</button>
      </form>
    </div>
    <script>
    function toggleCategory(isWantToRead) {
      document.getElementById('category-group').style.display = isWantToRead ? 'none' : '';
    }
    </script>
  </body>
</html>
