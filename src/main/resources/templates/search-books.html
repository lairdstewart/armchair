<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="page-content">
      <h3>Search Books</h3>
      <form th:action="@{/search-books}" method="POST">
        <input
          type="text"
          name="query"
          class="text-input"
          placeholder="Search for a book..."
          th:value="${query}"
          required
          autofocus
        />
        <button type="submit" class="btn">Search</button>
      </form>
      <div th:if="${searchResults != null && !searchResults.isEmpty()}">
        <h4>Search Results:</h4>
        <div th:each="book : ${searchResults}" style="margin-bottom: 15px; padding: 10px; border: 1px solid #ccc;">
          <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" target="_blank" class="book-title-link"><strong th:text="${book.title()}"></strong></a>
          <strong th:if="${book.bookUrl() == null}" th:text="${book.title()}"></strong>
          <span th:text="' by '"></span><a th:href="@{'https://openlibrary.org/search/authors?q=' + ${book.author()}}" target="_blank" class="book-title-link" th:text="${book.author()}"></a>
          <form th:action="@{/select-book}" method="POST" style="display: inline; margin-left: 10px;">
            <input type="hidden" name="workOlid" th:value="${book.workOlid()}" />
            <input type="hidden" name="bookName" th:value="${book.title()}" />
            <input type="hidden" name="author" th:value="${book.author()}" />
            <button type="submit" class="add-book-btn">+</button>
          </form>
        </div>
        <div th:if="${booksTotalPages != null && booksTotalPages > 1}" style="margin-top: 15px;">
          <th:block th:each="p : ${#numbers.sequence(0, booksTotalPages - 1)}">
            <span th:if="${p == booksPage}" th:text="${(p * bookPageSize + 1) + '-' + T(java.lang.Math).min((p + 1) * bookPageSize, booksTotalCount)}" style="font-weight: bold; margin-right: 8px;"></span>
            <a th:if="${p != booksPage}" th:href="@{/search-books(page=${p})}" class="book-action-link" th:text="${(p * bookPageSize + 1) + '-' + T(java.lang.Math).min((p + 1) * bookPageSize, booksTotalCount)}" style="margin-right: 8px;"></a>
          </th:block>
        </div>
      </div>
    </div>
  </body>
</html>
