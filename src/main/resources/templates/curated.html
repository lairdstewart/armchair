<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <h2>Curated Lists</h2>

    <div th:if="${!curatedUsers.isEmpty()}">
      <div th:each="user : ${curatedUsers}">
        <a th:href="@{/user/{username}(username=${user.username})}" th:text="${user.username}"></a>
      </div>
    </div>

    <p th:if="${curatedUsers.isEmpty()}">No curated lists available.</p>

  </body>
</html>
