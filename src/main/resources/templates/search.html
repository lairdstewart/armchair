<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="page-content">
      <form th:action="@{/search}" method="GET" style="margin-bottom: 20px;">
        <div style="margin-bottom: 15px;">
          <label><input type="radio" name="type" value="books" th:checked="${searchType == 'books'}" onchange="this.form.submit()" /> Books</label>
          <label style="margin-left: 15px;"><input type="radio" name="type" value="curated" th:checked="${searchType == 'curated'}" onchange="this.form.submit()" /> Curated Lists</label>
          <label style="margin-left: 15px;"><input type="radio" name="type" value="profiles" th:checked="${searchType == 'profiles'}" onchange="this.form.submit()" /> Profiles</label>
          <label style="margin-left: 15px;"><input type="radio" name="type" value="following" th:checked="${searchType == 'following'}" onchange="this.form.submit()" /> Following</label>
          <label style="margin-left: 15px;"><input type="radio" name="type" value="followers" th:checked="${searchType == 'followers'}" onchange="this.form.submit()" /> Followers</label>
        </div>
        <span th:if="${searchType != 'following' && searchType != 'followers'}">
          <input type="text" name="query" th:placeholder="${searchType == 'books' ? 'Search books...' : (searchType == 'profiles' ? 'Search profiles...' : 'Search curated lists...')}"
                 th:value="${query}" autofocus style="width: 200px;" />
          <button type="submit">Search</button>
        </span>
      </form>

      <!-- Books results -->
      <div th:if="${searchType == 'books'}">
        <ol th:if="${bookResults != null && !bookResults.isEmpty()}" style="list-style: none; padding-left: 0;">
          <li th:each="book : ${bookResults}">
            <span th:if="${userBooks != null && userBooks.containsKey(book.googleBooksId())}"
                  th:class="${'book-number ' + userBooks.get(book.googleBooksId()).category()}"
                  th:text="${userBooks.get(book.googleBooksId()).rank()}"></span>
            <form th:if="${userBooks == null || !userBooks.containsKey(book.googleBooksId())}" th:action="@{/select-book}" method="POST" style="display: inline; margin-right: 10px;">
              <input type="hidden" name="googleBooksId" th:value="${book.googleBooksId()}" />
              <input type="hidden" name="bookName" th:value="${book.title()}" />
              <input type="hidden" name="author" th:value="${book.author()}" />
              <button type="submit" class="add-book-btn">+</button>
            </form>
            <a th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" target="_blank" th:text="${book.title()}"></a>
            <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
          </li>
        </ol>
        <p>... 40 million more books</p>
      </div>

      <!-- Profiles results -->
      <div th:if="${searchType == 'profiles'}">
        <div th:if="${profileResults != null && !profileResults.isEmpty()}">
          <div th:each="profile : ${profileResults}" style="display: flex; align-items: center; margin-bottom: 4px;">
            <!-- Follow button (grey +) -->
            <form th:if="${canFollow && !profile.isFollowing()}" th:action="@{/follow}" method="POST" style="display: inline; margin: 0; margin-right: 8px;">
              <input type="hidden" name="userId" th:value="${profile.userId()}" />
              <input type="hidden" name="returnUrl" th:value="${'/search?type=profiles' + (query != null ? '&query=' + query : '')}" />
              <button type="submit" class="follow-btn">+</button>
            </form>
            <!-- Following indicator (green checkmark) -->
            <form th:if="${canFollow && profile.isFollowing()}" th:action="@{/unfollow}" method="POST" style="display: inline; margin: 0; margin-right: 8px;"
                  onsubmit="return confirm('Are you sure you want to unfollow this user?');">
              <input type="hidden" name="userId" th:value="${profile.userId()}" />
              <input type="hidden" name="returnUrl" th:value="${'/search?type=profiles' + (query != null ? '&query=' + query : '')}" />
              <button type="submit" class="follow-btn following">&#x2713;</button>
            </form>
            <a th:href="@{/user/{username}(username=${profile.username()})}" th:text="${profile.username()}"></a>
            <span th:text="${' ' + profile.stats()}"></span>
          </div>
        </div>
        <p th:if="${profileResults == null || profileResults.isEmpty()}">No profiles found.</p>
        <p th:if="${moreProfilesCount != null}" th:text="${'... ' + moreProfilesCount + ' more profiles'}"></p>
      </div>

      <!-- Following results -->
      <div th:if="${searchType == 'following'}">
        <div th:if="${profileResults != null && !profileResults.isEmpty()}">
          <div th:each="profile : ${profileResults}" style="display: flex; align-items: center; margin-bottom: 4px;">
            <!-- Following indicator (green checkmark) with unfollow -->
            <form th:if="${canFollow}" th:action="@{/unfollow}" method="POST" style="display: inline; margin: 0; margin-right: 8px;"
                  onsubmit="return confirm('Are you sure you want to unfollow this user?');">
              <input type="hidden" name="userId" th:value="${profile.userId()}" />
              <input type="hidden" name="returnUrl" value="/search?type=following" />
              <button type="submit" class="follow-btn following">&#x2713;</button>
            </form>
            <a th:href="@{/user/{username}(username=${profile.username()})}" th:text="${profile.username()}"></a>
            <span th:text="${' ' + profile.stats()}"></span>
          </div>
        </div>
        <p th:if="${profileResults == null || profileResults.isEmpty()}">You're not following anyone yet.</p>
      </div>

      <!-- Followers results -->
      <div th:if="${searchType == 'followers'}">
        <div th:if="${profileResults != null && !profileResults.isEmpty()}">
          <div th:each="profile : ${profileResults}" style="display: flex; align-items: center; margin-bottom: 4px;">
            <!-- Follow back button (grey + if not following, green check if following) -->
            <form th:if="${canFollow && !profile.isFollowing()}" th:action="@{/follow}" method="POST" style="display: inline; margin: 0; margin-right: 8px;">
              <input type="hidden" name="userId" th:value="${profile.userId()}" />
              <input type="hidden" name="returnUrl" value="/search?type=followers" />
              <button type="submit" class="follow-btn">+</button>
            </form>
            <form th:if="${canFollow && profile.isFollowing()}" th:action="@{/unfollow}" method="POST" style="display: inline; margin: 0; margin-right: 8px;"
                  onsubmit="return confirm('Are you sure you want to unfollow this user?');">
              <input type="hidden" name="userId" th:value="${profile.userId()}" />
              <input type="hidden" name="returnUrl" value="/search?type=followers" />
              <button type="submit" class="follow-btn following">&#x2713;</button>
            </form>
            <a th:href="@{/user/{username}(username=${profile.username()})}" th:text="${profile.username()}"></a>
            <span th:text="${' ' + profile.stats()}"></span>
          </div>
        </div>
        <p th:if="${profileResults == null || profileResults.isEmpty()}">You don't have any followers yet.</p>
      </div>

      <!-- Curated lists results -->
      <div th:if="${searchType == 'curated'}">
        <div th:if="${curatedResults != null && !curatedResults.isEmpty()}">
          <div th:each="user : ${curatedResults}">
            <a th:href="@{/user/{username}(username=${user.username})}" th:text="${user.username}"></a>
          </div>
        </div>
        <p th:if="${curatedResults == null || curatedResults.isEmpty()}">No curated lists available.</p>
      </div>
    </div>
  </body>
</html>
