<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="page-content">
      <form th:action="@{/search}" method="GET" style="margin-bottom: 20px;">
        <div style="margin-bottom: 15px;">
          <label><input type="radio" name="type" value="books" th:checked="${searchType == 'books'}" onchange="showSearchTab('books')" /> Books</label>
          <label style="margin-left: 15px;"><input type="radio" name="type" value="curated" th:checked="${searchType == 'curated'}" onchange="showSearchTab('curated')" /> Curated Lists</label>
          <label style="margin-left: 15px;"><input type="radio" name="type" value="profiles" th:checked="${searchType == 'profiles'}" onchange="showSearchTab('profiles')" /> Profiles</label>
          <label style="margin-left: 15px;"><input type="radio" name="type" value="following" th:checked="${searchType == 'following'}" onchange="showSearchTab('following')" /> Following</label>
          <label style="margin-left: 15px;"><input type="radio" name="type" value="followers" th:checked="${searchType == 'followers'}" onchange="showSearchTab('followers')" /> Followers</label>
        </div>
        <span id="search-bar" th:style="${searchType == 'following' || searchType == 'followers' ? 'display:none' : ''}">
          <input type="text" name="query" id="searchQuery" th:placeholder="${searchType == 'books' ? 'Search books...' : (searchType == 'profiles' ? 'Search profiles...' : 'Search curated lists...')}"
                 th:value="${query}" autofocus style="width: 200px;" />
          <button type="submit">Search</button>
        </span>
      </form>

      <!-- Books results -->
      <div id="stab-books" th:style="${searchType == 'books' ? '' : 'display:none'}">
        <ol th:if="${bookResults != null && !bookResults.isEmpty()}" style="list-style: none; padding-left: 0;">
          <li th:each="book : ${bookResults}" th:with="ubr=${userBooks != null && book.workOlid() != null ? userBooks.get(book.workOlid()) : null}" style="margin-bottom: 4px;">
            <div class="book-entry">
              <div class="book-info">
                <div class="book-title">
                  <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" target="_blank" th:text="${book.title()}"></a>
                  <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                </div>
                <div th:if="${book.author() != null && !book.author().isBlank()}" class="book-author"><span th:text="${book.author()}"></span><span th:if="${book.firstPublishYear() != null}" th:text="${' (' + book.firstPublishYear() + ')'}"></span></div>
                <!-- Already ranked -->
                <span th:if="${ubr != null && ubr.category() != 'want_to_read' && ubr.category() != 'unranked'}"
                      class="book-action-text" th:text="${'[#' + ubr.rank() + ']'}"></span>
                <!-- Already bookmarked - show [rank] link and static [want to read] -->
                <span th:if="${ubr != null && ubr.category() == 'want_to_read'}">
                  <form th:action="@{/mark-as-read}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${ubr.rankingId()}" />
                    <button type="submit" class="book-action-link">[rank]</button>
                  </form>
                  <span class="book-action-text">[want to read]</span>
                </span>
                <!-- Already in unranked list -->
                <span th:if="${ubr != null && ubr.category() == 'unranked'}"
                      class="book-action-text">[unranked]</span>
                <!-- Not in library - show action links -->
                <span th:if="${ubr == null}" class="book-actions">
                  <form th:action="@{/select-book}" method="POST" style="display: inline;">
                    <input type="hidden" name="workOlid" th:value="${book.workOlid()}" />
                    <input type="hidden" name="bookName" th:value="${book.title()}" />
                    <input type="hidden" name="author" th:value="${book.author()}" />
                    <input type="hidden" name="editionOlid" th:value="${book.editionOlid()}" />
                    <input type="hidden" name="firstPublishYear" th:value="${book.firstPublishYear()}" />
                    <input type="hidden" name="coverId" th:value="${book.coverId()}" />
                    <button type="submit" class="book-action-link">[rank]</button>
                  </form>
                  <form th:action="@{/add-to-reading-list}" method="POST" style="display: inline;">
                    <input type="hidden" name="workOlid" th:value="${book.workOlid()}" />
                    <input type="hidden" name="bookName" th:value="${book.title()}" />
                    <input type="hidden" name="author" th:value="${book.author()}" />
                    <input type="hidden" name="editionOlid" th:value="${book.editionOlid()}" />
                    <input type="hidden" name="firstPublishYear" th:value="${book.firstPublishYear()}" />
                    <input type="hidden" name="coverId" th:value="${book.coverId()}" />
                    <button type="submit" class="book-action-link">[want to read]</button>
                  </form>
                </span>
              </div>
              <img th:if="${book.coverUrl() != null}" class="book-cover" th:src="${book.coverUrl()}" /><div th:if="${book.coverUrl() == null}" class="book-cover-placeholder">?</div>
            </div>
          </li>
        </ol>
        <p th:if="${localResults && !moreResults}"><a th:href="@{/search(type='books', query=${query}, more=true)}" style="color: #888; text-decoration: none;">[more results]</a></p>
        <p th:if="${query == null || query.isBlank()}">... 40 million more books</p>
        <p th:if="${query != null && !query.isBlank() && (bookResults == null || bookResults.isEmpty())}">No results found.</p>
      </div>

      <!-- Profiles results -->
      <div id="stab-profiles" th:style="${searchType == 'profiles' ? '' : 'display:none'}">
        <div th:if="${profileSearchResults != null && !profileSearchResults.isEmpty()}">
          <div th:each="profile : ${profileSearchResults}" style="margin-bottom: 4px;">
            <a th:href="@{/user/{username}(username=${profile.username()})}" th:text="${profile.username()}"></a>
            <span th:text="${' ' + profile.stats()}"></span>
            <form th:if="${canFollow && !profile.isFollowing() && userHasPublished}" th:action="@{/follow}" method="POST" style="display: inline;" class="book-actions">
              <input type="hidden" name="userId" th:value="${profile.userId()}" />
              <input type="hidden" name="returnUrl" th:value="${'/search?type=profiles' + (query != null ? '&query=' + query : '')}" />
              <button type="submit" class="book-action-link">[follow]</button>
            </form>
            <span th:if="${canFollow && !profile.isFollowing() && !userHasPublished}" class="book-actions">
              <button type="button" class="book-action-link" onclick="alert('You must publish your lists before you can follow other users. Go to your Profile to enable this.');">[follow]</button>
            </span>
            <form th:if="${canFollow && profile.isFollowing()}" th:action="@{/unfollow}" method="POST" style="display: inline;" class="book-actions"
                  onsubmit="return confirm('Are you sure you want to unfollow this user?');">
              <input type="hidden" name="userId" th:value="${profile.userId()}" />
              <input type="hidden" name="returnUrl" th:value="${'/search?type=profiles' + (query != null ? '&query=' + query : '')}" />
              <button type="submit" class="book-action-link">[unfollow]</button>
            </form>
          </div>
        </div>
        <p th:if="${profileSearchResults == null || profileSearchResults.isEmpty()}">No profiles found.</p>
        <div th:if="${profilesTotalPages != null && profilesTotalPages > 1}" style="margin-top: 15px;">
          <th:block th:each="p : ${#numbers.sequence(0, profilesTotalPages - 1)}">
            <span th:if="${p == profilesPage}" th:text="${(p * pageSize + 1) + '-' + T(java.lang.Math).min((p + 1) * pageSize, profilesTotalCount)}" style="font-weight: bold; margin-right: 8px;"></span>
            <a th:if="${p != profilesPage}" th:href="@{/search(type='profiles', query=${query}, page=${p})}" class="book-action-link" th:text="${'[' + (p * pageSize + 1) + '-' + T(java.lang.Math).min((p + 1) * pageSize, profilesTotalCount) + ']'}" style="margin-right: 8px;"></a>
          </th:block>
        </div>
      </div>

      <!-- Following results -->
      <div id="stab-following" th:style="${searchType == 'following' ? '' : 'display:none'}">
        <div th:if="${followingResults != null && !followingResults.isEmpty()}">
          <div th:each="profile : ${followingResults}" style="margin-bottom: 4px;">
            <a th:href="@{/user/{username}(username=${profile.username()})}" th:text="${profile.username()}"></a>
            <span th:text="${' ' + profile.stats()}"></span>
            <form th:if="${canFollow}" th:action="@{/unfollow}" method="POST" style="display: inline;" class="book-actions"
                  onsubmit="return confirm('Are you sure you want to unfollow this user?');">
              <input type="hidden" name="userId" th:value="${profile.userId()}" />
              <input type="hidden" name="returnUrl" value="/search?type=following" />
              <button type="submit" class="book-action-link">[unfollow]</button>
            </form>
          </div>
        </div>
        <p th:if="${followingResults == null || followingResults.isEmpty()}">You're not following anyone yet.</p>
        <div th:if="${followingTotalPages != null && followingTotalPages > 1}" style="margin-top: 15px;">
          <th:block th:each="p : ${#numbers.sequence(0, followingTotalPages - 1)}">
            <span th:if="${p == followingPage}" th:text="${(p * pageSize + 1) + '-' + T(java.lang.Math).min((p + 1) * pageSize, followingTotalCount)}" style="font-weight: bold; margin-right: 8px;"></span>
            <a th:if="${p != followingPage}" th:href="@{/search(type='following', page=${p})}" class="book-action-link" th:text="${'[' + (p * pageSize + 1) + '-' + T(java.lang.Math).min((p + 1) * pageSize, followingTotalCount) + ']'}" style="margin-right: 8px;"></a>
          </th:block>
        </div>
      </div>

      <!-- Followers results -->
      <div id="stab-followers" th:style="${searchType == 'followers' ? '' : 'display:none'}">
        <div th:if="${followerResults != null && !followerResults.isEmpty()}">
          <div th:each="profile : ${followerResults}" style="margin-bottom: 4px;">
            <a th:href="@{/user/{username}(username=${profile.username()})}" th:text="${profile.username()}"></a>
            <span th:text="${' ' + profile.stats()}"></span>
            <form th:if="${canFollow && !profile.isFollowing() && userHasPublished}" th:action="@{/follow}" method="POST" style="display: inline;" class="book-actions">
              <input type="hidden" name="userId" th:value="${profile.userId()}" />
              <input type="hidden" name="returnUrl" value="/search?type=followers" />
              <button type="submit" class="book-action-link">[follow]</button>
            </form>
            <span th:if="${canFollow && !profile.isFollowing() && !userHasPublished}" class="book-actions">
              <button type="button" class="book-action-link" onclick="alert('You must publish your lists before you can follow other users. Go to your Profile to enable this.');">[follow]</button>
            </span>
            <form th:if="${canFollow && profile.isFollowing()}" th:action="@{/unfollow}" method="POST" style="display: inline;" class="book-actions"
                  onsubmit="return confirm('Are you sure you want to unfollow this user?');">
              <input type="hidden" name="userId" th:value="${profile.userId()}" />
              <input type="hidden" name="returnUrl" value="/search?type=followers" />
              <button type="submit" class="book-action-link">[unfollow]</button>
            </form>
          </div>
        </div>
        <p th:if="${followerResults == null || followerResults.isEmpty()}">You don't have any followers yet.</p>
        <div th:if="${followersTotalPages != null && followersTotalPages > 1}" style="margin-top: 15px;">
          <th:block th:each="p : ${#numbers.sequence(0, followersTotalPages - 1)}">
            <span th:if="${p == followersPage}" th:text="${(p * pageSize + 1) + '-' + T(java.lang.Math).min((p + 1) * pageSize, followersTotalCount)}" style="font-weight: bold; margin-right: 8px;"></span>
            <a th:if="${p != followersPage}" th:href="@{/search(type='followers', page=${p})}" class="book-action-link" th:text="${'[' + (p * pageSize + 1) + '-' + T(java.lang.Math).min((p + 1) * pageSize, followersTotalCount) + ']'}" style="margin-right: 8px;"></a>
          </th:block>
        </div>
      </div>

      <!-- Curated lists results -->
      <div id="stab-curated" th:style="${searchType == 'curated' ? '' : 'display:none'}">
        <div th:if="${curatedResults != null && !curatedResults.isEmpty()}">
          <div th:each="user : ${curatedResults}" style="margin-bottom: 4px;">
            <a th:href="@{/user/{username}(username=${user.username})}" th:text="${user.username}"></a>
          </div>
        </div>
        <p th:if="${curatedResults == null || curatedResults.isEmpty()}">No curated lists available.</p>
        <div th:if="${curatedTotalPages != null && curatedTotalPages > 1}" style="margin-top: 15px;">
          <th:block th:each="p : ${#numbers.sequence(0, curatedTotalPages - 1)}">
            <span th:if="${p == curatedPage}" th:text="${(p * pageSize + 1) + '-' + T(java.lang.Math).min((p + 1) * pageSize, curatedTotalCount)}" style="font-weight: bold; margin-right: 8px;"></span>
            <a th:if="${p != curatedPage}" th:href="@{/search(type='curated', query=${query}, page=${p})}" class="book-action-link" th:text="${'[' + (p * pageSize + 1) + '-' + T(java.lang.Math).min((p + 1) * pageSize, curatedTotalCount) + ']'}" style="margin-right: 8px;"></a>
          </th:block>
        </div>
      </div>
    </div>
    <script>
    function showSearchTab(type) {
      document.querySelectorAll('[id^="stab-"]').forEach(function(el) { el.style.display = 'none'; });
      var tab = document.getElementById('stab-' + type);
      if (tab) tab.style.display = '';
      var searchBar = document.getElementById('search-bar');
      var queryInput = document.getElementById('searchQuery');
      if (type === 'following' || type === 'followers') {
        searchBar.style.display = 'none';
      } else {
        searchBar.style.display = '';
        queryInput.placeholder = type === 'books' ? 'Search books...' : (type === 'profiles' ? 'Search profiles...' : 'Search curated lists...');
      }
      queryInput.value = '';
    }
    </script>
  </body>
</html>
