<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="page-content">
    <h3>Import from Goodreads</h3>
    <p>In Goodreads go to "My Books", then "Import and Export", and click "Export Library" to download a .csv.</p>
    <form th:action="@{/import-goodreads}" method="POST" enctype="multipart/form-data">
      <input type="file" name="file" accept=".csv" required />
      <button type="submit" style="margin-left: 10px;">Import Books</button>
    </form>
    <p th:if="${resultMessage != null}" th:text="${resultMessage}"></p>
    </div>
  </body>
</html>
