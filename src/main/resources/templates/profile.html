<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="page-content">
    <p><strong>Username:</strong> <span th:text="${username}"></span>
      <a th:href="@{/change-username}" class="book-action-link">change</a>
    </p>
    <p th:if="${signupDate != null}"><strong>User since:</strong> <span th:text="${#temporals.format(signupDate, 'MMMM d, yyyy')}"></span></p>
    <p th:if="${signupNumber != null}"><strong>User number:</strong> <span th:text="${signupNumber}"></span></p>
    <p><strong>Fiction books:</strong> <span th:text="${fictionCount}"></span></p>
    <p><strong>Non-Fiction books:</strong> <span th:text="${nonfictionCount}"></span></p>

    <p><strong>Public profile:</strong> <a th:href="${publicProfileUrl}" th:text="${publicProfileUrl}"></a></p>

    <div class="profile-buttons" style="margin-top: 20px;">

      <a th:href="@{/import-goodreads}" style="text-decoration: none;">
        <button type="button" class="btn">Import from Goodreads</button>
      </a>
      <a th:if="${hasAnyBooks}" th:href="@{/export-csv}" style="text-decoration: none;">
        <button type="button" class="btn">Export Book Lists to .csv</button>
      </a>
      <form th:action="@{/logout}" method="POST">
        <button type="submit" class="btn">Logout</button>
      </form>
      <form th:action="@{/delete-profile}" method="POST"
            onsubmit="return confirm('Are you sure you want to delete your profile? This will permanently remove all your data and cannot be undone.');">
        <button type="submit" class="btn">Delete Profile</button>
      </form>
    </div>
    </div>
  </body>
</html>
