<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <h2>Explore Profiles</h2>

    <form action="/explore-profiles" method="GET" style="margin-bottom: 20px;">
      <input type="text" name="query" placeholder="Search usernames..."
             th:value="${query}" autofocus style="width: 200px;" />
      <button type="submit">Search</button>
    </form>

    <ul th:if="${searchResults != null && !searchResults.isEmpty()}">
      <li th:each="profile : ${searchResults}">
        <a th:href="@{/user/{username}(username=${profile.username()})}" th:text="${profile.displayText()}"></a>
      </li>
    </ul>

    <div th:if="${recentProfiles != null}">
      <ul th:if="${!recentProfiles.isEmpty()}">
        <li th:each="profile : ${recentProfiles}">
          <a th:href="@{/user/{username}(username=${profile.username()})}" th:text="${profile.displayText()}"></a>
        </li>
      </ul>
      <p th:if="${recentProfiles.isEmpty()}">No profiles yet.</p>
      <p th:text="${'... ' + moreProfilesCount + ' more profiles'}"></p>
    </div>

  </body>
</html>
