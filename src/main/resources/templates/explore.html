<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="page-content">
    <h2>Search Profiles</h2>

    <form action="/search-profiles" method="GET" style="margin-bottom: 20px;">
      <input type="text" name="query" class="text-input" placeholder="Search usernames..."
             th:value="${query}" autofocus />
      <button type="submit" class="btn">Search</button>
    </form>

    <div th:if="${searchResults != null && !searchResults.isEmpty()}">
      <div th:each="profile : ${searchResults}">
        <a th:href="@{/user/{username}(username=${profile.username()})}" th:text="${profile.username()}"></a>
        <span th:text="${' ' + profile.stats()}"></span>
      </div>
    </div>

    <div th:if="${recentProfiles != null}">
      <div th:if="${!recentProfiles.isEmpty()}">
        <div th:each="profile : ${recentProfiles}">
          <a th:href="@{/user/{username}(username=${profile.username()})}" th:text="${profile.username()}"></a>
          <span th:text="${' ' + profile.stats()}"></span>
        </div>
      </div>
      <p th:if="${recentProfiles.isEmpty()}"><em>No profiles yet.</em></p>
      <p th:text="${'... ' + moreProfilesCount + ' more profiles'}"></p>
    </div>
    </div>
  </body>
</html>
