<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Explore Profiles</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <h2>Explore Profiles</h2>

    <form action="/explore-profiles" method="GET" style="margin-bottom: 20px;">
      <input type="text" name="query" placeholder="Search usernames..."
             th:value="${query}" autofocus style="width: 200px;" />
      <button type="submit">Search</button>
    </form>

    <ul th:if="${searchResults != null && !searchResults.isEmpty()}">
      <li th:each="user : ${searchResults}">
        <a th:href="@{/user/{username}(username=${user.username})}" th:text="${user.username}"></a>
      </li>
    </ul>

  </body>
</html>
