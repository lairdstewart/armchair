<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <script th:src="@{/js/cover-fallback.js}"></script>
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="page-content">
      <div style="margin-bottom: 15px;">
        <label>
          <input type="radio" name="typeSelector" value="FICTION" checked onchange="showTab('FICTION')" />
          Fiction
        </label>
        <label style="margin-left: 15px;">
          <input type="radio" name="typeSelector" value="NONFICTION" onchange="showTab('NONFICTION')" />
          Non-Fiction
        </label>
      </div>

      <div id="tab-FICTION">
        <div th:if="${fictionRankedCount < minRankedBooks}">
          <p><em th:text="'Rank ' + ${minRankedBooks} + ' Fiction books to get recommendations'"></em></p>
        </div>
        <div th:if="${fictionRankedCount >= minRankedBooks && fictionRecs.isEmpty()}">
          <p><em>No fiction recommendations yet.</em></p>
        </div>
        <div th:if="${fictionRankedCount >= minRankedBooks && !fictionRecs.isEmpty()}">
          <ol class="book-list">
            <li th:each="book, iter : ${fictionRecs}">
              <span class="book-number liked" th:text="${iter.index + 1}"></span>
              <th:block th:replace="~{fragments :: bookEntry(${book}, ~{:: .fiction-rec-actions})}">
                <span class="fiction-rec-actions">
                  <form th:if="${book.workOlid() != null && !userBooks.containsKey(book.workOlid())}" th:action="@{/add-to-reading-list}" method="POST" style="display: inline;">
                    <input type="hidden" name="workOlid" th:value="${book.workOlid()}" />
                    <input type="hidden" name="bookName" th:value="${book.title()}" />
                    <input type="hidden" name="author" th:value="${book.author()}" />
                    <input type="hidden" name="editionOlid" th:value="${book.editionOlid()}" />
                    <input type="hidden" name="returnUrl" value="/recs" />
                    <button type="submit" class="book-action-link">want to read</button>
                  </form>
                  <a th:if="${book.workOlid() != null && userBooks.containsKey(book.workOlid())}"
                     th:href="@{/my-books(selectedBookshelf=${userBooks.get(book.workOlid()).bookshelf()})}"
                     class="book-action-link">in library</a>
                </span>
              </th:block>
            </li>
          </ol>
        </div>
      </div>

      <div id="tab-NONFICTION" style="display: none;">
        <div th:if="${nonfictionRankedCount < minRankedBooks}">
          <p><em th:text="'Rank ' + ${minRankedBooks} + ' Non-Fiction books to get recommendations'"></em></p>
        </div>
        <div th:if="${nonfictionRankedCount >= minRankedBooks && nonfictionRecs.isEmpty()}">
          <p><em>No nonfiction recommendations yet.</em></p>
        </div>
        <div th:if="${nonfictionRankedCount >= minRankedBooks && !nonfictionRecs.isEmpty()}">
          <ol class="book-list">
            <li th:each="book, iter : ${nonfictionRecs}">
              <span class="book-number liked" th:text="${iter.index + 1}"></span>
              <th:block th:replace="~{fragments :: bookEntry(${book}, ~{:: .nonfiction-rec-actions})}">
                <span class="nonfiction-rec-actions">
                  <form th:if="${book.workOlid() != null && !userBooks.containsKey(book.workOlid())}" th:action="@{/add-to-reading-list}" method="POST" style="display: inline;">
                    <input type="hidden" name="workOlid" th:value="${book.workOlid()}" />
                    <input type="hidden" name="bookName" th:value="${book.title()}" />
                    <input type="hidden" name="author" th:value="${book.author()}" />
                    <input type="hidden" name="editionOlid" th:value="${book.editionOlid()}" />
                    <input type="hidden" name="returnUrl" value="/recs" />
                    <button type="submit" class="book-action-link">want to read</button>
                  </form>
                  <a th:if="${book.workOlid() != null && userBooks.containsKey(book.workOlid())}"
                     th:href="@{/my-books(selectedBookshelf=${userBooks.get(book.workOlid()).bookshelf()})}"
                     class="book-action-link">in library</a>
                </span>
              </th:block>
            </li>
          </ol>
        </div>
      </div>
    </div>

    <script>
    function showTab(type) {
      document.querySelectorAll('[id^="tab-"]').forEach(function(el) { el.style.display = 'none'; });
      var tab = document.getElementById('tab-' + type);
      if (tab) tab.style.display = '';
    }
    </script>
    <script th:src="@{/js/review-toggle.js}"></script>
  </body>
</html>
