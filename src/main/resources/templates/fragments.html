<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="navbar" class="navbar">
      <div class="navbar-left" style="padding-left: 1em;">
        <a href="/" class="navbar-link" data-text="Armchair" th:style="${currentPage == 'about' ? 'font-weight: bold;' : ''}">Armchair</a>
        <span class="navbar-separator">|</span>
        <a href="/search" class="navbar-link" data-text="Search" th:style="${currentPage == 'search' ? 'font-weight: bold;' : ''}">Search</a>
        <span class="navbar-separator">|</span>
        <form id="library-form" th:action="@{/my-books}" method="POST" style="display: none"></form>
        <a href="#" onclick="document.getElementById('library-form').submit(); return false;" class="navbar-link" data-text="Library" th:style="${currentPage == 'list' ? 'font-weight: bold;' : ''}">Library</a>
        <span class="navbar-separator">|</span>
        <a href="/recs" class="navbar-link" data-text="Recs" th:style="${currentPage == 'recs' ? 'font-weight: bold;' : ''}">Recs</a>
      </div>
      <div class="navbar-right" style="padding-right: 1em;">
        <a th:if="${isLoggedIn}" href="/my-profile" class="navbar-link" data-text="Profile" th:style="${currentPage == 'profile' ? 'font-weight: bold;' : ''}">Profile</a>
        <a th:unless="${isLoggedIn}" href="/login" class="navbar-link" data-text="Login" th:style="${currentPage == 'login' ? 'font-weight: bold;' : ''}">Login</a>
      </div>
    </div>

    <!--
      Book entry fragment with optional review toggle and actions slot.
      Parameters:
        - book: BookInfo record
        - actions: fragment expression for action buttons (bare forms, no wrapper), or null for read-only
        - showCover: boolean, whether to show the book cover (default true)
    -->
    <th:block th:fragment="bookEntry(book, actions, showCover)">
      <div th:if="${book.review() == null}" class="book-entry-wrapper">
        <div class="book-entry">
          <div class="book-info">
            <div class="book-title">
              <span th:text="${book.title()}"></span>
            </div>
            <div th:if="${book.author() != null && !book.author().isBlank()}" class="book-author">
              <span th:text="${book.author()}"></span>
              <span th:if="${book.firstPublishYear() != null}" th:text="${' (' + book.firstPublishYear() + ')'}"></span>
            </div>
            <span class="book-actions">
              <th:block th:if="${actions != null}" th:replace="${actions}" />
              <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" target="_blank" class="book-action-link">openlibrary.org</a>
            </span>
          </div>
          <img th:if="${showCover and book.coverUrl() != null}" class="book-cover" loading="lazy" th:src="${book.coverUrl()}" />
          <div th:if="${showCover and book.coverUrl() == null}" class="book-cover-placeholder">?</div>
        </div>
      </div>
      <details th:if="${book.review() != null}" class="book-review">
        <summary>
          <div class="book-entry">
            <div class="book-info">
              <div class="book-title">
                <span th:text="${book.title()}"></span>
              </div>
              <div th:if="${book.author() != null && !book.author().isBlank()}" class="book-author">
                <span th:text="${book.author()}"></span>
                <span th:if="${book.firstPublishYear() != null}" th:text="${' (' + book.firstPublishYear() + ')'}"></span>
              </div>
              <span class="book-actions">
                <span class="review-toggle"></span>
                <th:block th:if="${actions != null}" th:replace="${actions}" />
                <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" onclick="event.stopPropagation()" target="_blank" class="book-action-link">openlibrary.org</a>
              </span>
            </div>
            <img th:if="${showCover and book.coverUrl() != null}" class="book-cover" loading="lazy" th:src="${book.coverUrl()}" />
            <div th:if="${showCover and book.coverUrl() == null}" class="book-cover-placeholder">?</div>
          </div>
        </summary>
        <div class="review-text" th:text="${book.review()}"></div>
      </details>
    </th:block>

    <!--
      Library action buttons (bare forms, no wrapper): review, re-rank, remove
      Parameter: book - BookInfo record
    -->
    <th:block th:fragment="libraryActions(book)">
      <form th:if="${book.review() == null}" th:action="@{/direct-review}" method="POST" style="display: inline;">
        <input type="hidden" name="bookId" th:value="${book.id()}" />
        <button type="submit" class="book-action-link">write review</button>
      </form>
      <form th:action="@{/direct-rerank}" method="POST" style="display: inline;">
        <input type="hidden" name="bookId" th:value="${book.id()}" />
        <button type="submit" class="book-action-link">re-rank</button>
      </form>
      <form th:action="@{/direct-remove}" method="POST" style="display: inline;" onsubmit="return confirm('Are you sure you want to remove this book?');">
        <input type="hidden" name="bookId" th:value="${book.id()}" />
        <button type="submit" class="book-action-link">remove</button>
      </form>
    </th:block>
  </body>
</html>
