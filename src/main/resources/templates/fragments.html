<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="navbar" class="navbar">
      <div class="navbar-left">
        <a href="/" class="navbar-link">Armchair</a>
        <span class="navbar-separator">|</span>
        <form th:action="@{/my-books}" method="POST" style="display: inline">
          <button type="submit" class="navbar-link-button">My Books</button>
        </form>
        <span class="navbar-separator">|</span>
        <a href="/search-books" class="navbar-link">Search Books</a>
        <span class="navbar-separator">|</span>
        <a href="/search-profiles" class="navbar-link">Search Profiles</a>
        <span class="navbar-separator">|</span>
        <a href="/curated-lists" class="navbar-link">Curated Lists</a>
      </div>
      <div class="navbar-right">
        <a th:if="${isLoggedIn}" href="/my-profile" class="navbar-link">My Profile</a>
        <a th:if="${!isLoggedIn}" href="/oauth2/authorization/google" class="navbar-link">Login/Signup</a>
      </div>
    </div>

    <div th:fragment="bookLists(fictionBooks, nonfictionBooks)" style="display: flex; gap: 40px">
      <div style="flex: 1">
        <h3>Fiction</h3>
        <ol>
          <li th:each="book, iter : ${fictionBooks.liked()}">
            <span class="book-number liked" th:text="${iter.index + 1}"></span>
            <span>
              <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
          </li>
          <li th:each="book, iter : ${fictionBooks.ok()}">
            <span class="book-number ok" th:text="${fictionBooks.liked().size() + iter.index + 1}"></span>
            <span>
              <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
          </li>
          <li th:each="book, iter : ${fictionBooks.disliked()}">
            <span class="book-number disliked" th:text="${fictionBooks.liked().size() + fictionBooks.ok().size() + iter.index + 1}"></span>
            <span>
              <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
          </li>
        </ol>
      </div>

      <div style="flex: 1">
        <h3>Non-Fiction</h3>
        <ol>
          <li th:each="book, iter : ${nonfictionBooks.liked()}">
            <span class="book-number liked" th:text="${iter.index + 1}"></span>
            <span>
              <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
          </li>
          <li th:each="book, iter : ${nonfictionBooks.ok()}">
            <span class="book-number ok" th:text="${nonfictionBooks.liked().size() + iter.index + 1}"></span>
            <span>
              <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
          </li>
          <li th:each="book, iter : ${nonfictionBooks.disliked()}">
            <span class="book-number disliked" th:text="${nonfictionBooks.liked().size() + nonfictionBooks.ok().size() + iter.index + 1}"></span>
            <span>
              <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
          </li>
        </ol>
      </div>
    </div>
  </body>
</html>
