<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="navbar" class="navbar">
      <div class="navbar-left" style="padding-left: 1em;">
        <a href="/" class="navbar-link" th:style="${currentPage == 'about' ? 'font-weight: bold;' : ''}">Armchair</a>
        <span class="navbar-separator">|</span>
        <a href="/search" class="navbar-link" th:style="${currentPage == 'search' ? 'font-weight: bold;' : ''}">Search</a>
        <span class="navbar-separator">|</span>
        <form th:action="@{/my-books}" method="POST" style="display: inline">
          <button type="submit" class="navbar-link-button" th:style="${currentPage == 'list' ? 'font-weight: bold;' : ''}">Library</button>
        </form>
        <span class="navbar-separator">|</span>
        <a href="/recs" class="navbar-link" th:style="${currentPage == 'recs' ? 'font-weight: bold;' : ''}">Recs</a>
      </div>
      <div class="navbar-right" style="padding-right: 1em;">
        <a th:if="${isLoggedIn}" href="/my-profile" class="navbar-link" th:style="${currentPage == 'profile' ? 'font-weight: bold;' : ''}">Profile</a>
        <a th:if="${!isLoggedIn}" href="/oauth2/authorization/google" class="navbar-link">Login</a>
      </div>
    </div>

    <div th:fragment="bookLists(fictionBooks, nonfictionBooks)" style="display: flex; gap: 40px">
      <div th:if="${!fictionBooks.liked().isEmpty() || !fictionBooks.ok().isEmpty() || !fictionBooks.disliked().isEmpty() || !fictionBooks.unranked().isEmpty()}" style="flex: 1">
        <h3>Fiction</h3>
        <ol class="book-list">
          <li th:each="book, iter : ${fictionBooks.liked()}">
            <span class="book-number liked" th:text="${iter.index + 1}"></span>
            <span th:if="${book.review() == null}">
              <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
            <details th:if="${book.review() != null}" class="book-review">
              <summary>
                <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                <span class="review-toggle"></span>
              </summary>
              <div class="review-text" th:text="${book.review()}"></div>
            </details>
          </li>
          <li th:each="book, iter : ${fictionBooks.ok()}">
            <span class="book-number ok" th:text="${fictionBooks.liked().size() + iter.index + 1}"></span>
            <span th:if="${book.review() == null}">
              <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
            <details th:if="${book.review() != null}" class="book-review">
              <summary>
                <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                <span class="review-toggle"></span>
              </summary>
              <div class="review-text" th:text="${book.review()}"></div>
            </details>
          </li>
          <li th:each="book, iter : ${fictionBooks.disliked()}">
            <span class="book-number disliked" th:text="${fictionBooks.liked().size() + fictionBooks.ok().size() + iter.index + 1}"></span>
            <span th:if="${book.review() == null}">
              <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
            <details th:if="${book.review() != null}" class="book-review">
              <summary>
                <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                <span class="review-toggle"></span>
              </summary>
              <div class="review-text" th:text="${book.review()}"></div>
            </details>
          </li>
          <li th:each="book : ${fictionBooks.unranked()}">
            <span class="book-number unranked">?</span>
            <span th:if="${book.review() == null}">
              <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
            <details th:if="${book.review() != null}" class="book-review">
              <summary>
                <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                <span class="review-toggle"></span>
              </summary>
              <div class="review-text" th:text="${book.review()}"></div>
            </details>
          </li>
        </ol>
      </div>

      <div th:if="${!nonfictionBooks.liked().isEmpty() || !nonfictionBooks.ok().isEmpty() || !nonfictionBooks.disliked().isEmpty() || !nonfictionBooks.unranked().isEmpty()}" style="flex: 1">
        <h3>Non-Fiction</h3>
        <ol class="book-list">
          <li th:each="book, iter : ${nonfictionBooks.liked()}">
            <span class="book-number liked" th:text="${iter.index + 1}"></span>
            <span th:if="${book.review() == null}">
              <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
            <details th:if="${book.review() != null}" class="book-review">
              <summary>
                <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                <span class="review-toggle"></span>
              </summary>
              <div class="review-text" th:text="${book.review()}"></div>
            </details>
          </li>
          <li th:each="book, iter : ${nonfictionBooks.ok()}">
            <span class="book-number ok" th:text="${nonfictionBooks.liked().size() + iter.index + 1}"></span>
            <span th:if="${book.review() == null}">
              <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
            <details th:if="${book.review() != null}" class="book-review">
              <summary>
                <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                <span class="review-toggle"></span>
              </summary>
              <div class="review-text" th:text="${book.review()}"></div>
            </details>
          </li>
          <li th:each="book, iter : ${nonfictionBooks.disliked()}">
            <span class="book-number disliked" th:text="${nonfictionBooks.liked().size() + nonfictionBooks.ok().size() + iter.index + 1}"></span>
            <span th:if="${book.review() == null}">
              <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
            <details th:if="${book.review() != null}" class="book-review">
              <summary>
                <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                <span class="review-toggle"></span>
              </summary>
              <div class="review-text" th:text="${book.review()}"></div>
            </details>
          </li>
          <li th:each="book : ${nonfictionBooks.unranked()}">
            <span class="book-number unranked">?</span>
            <span th:if="${book.review() == null}">
              <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
              <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
              <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
            </span>
            <details th:if="${book.review() != null}" class="book-review">
              <summary>
                <a th:if="${book.bookUrl() != null}" th:href="${book.bookUrl()}" th:text="${book.title()}" target="_blank"></a>
                <span th:if="${book.bookUrl() == null}" th:text="${book.title()}"></span>
                <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                <span class="review-toggle"></span>
              </summary>
              <div class="review-text" th:text="${book.review()}"></div>
            </details>
          </li>
        </ol>
      </div>
    </div>
  </body>
</html>
