<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <th:block th:fragment="content">
    <form th:action="@{/cancel-add}" method="POST" style="margin-bottom: 0;">
      <button type="submit" class="btn-back">cancel</button>
    </form>
    <h3>Which was better?</h3>
    <form th:action="@{/choose}" method="POST" style="margin-bottom: 4px;">
      <input type="hidden" name="choice" value="new" />
      <button type="submit" class="book-select-btn">
        <div class="book-entry">
          <div class="book-info">
            <div class="book-title" th:text="${rankingState.bookIdentity.title}"></div>
            <div th:if="${rankingState.bookIdentity.author != null && !rankingState.bookIdentity.author.isBlank()}" class="book-author" th:text="${rankingState.bookIdentity.author}"></div>
          </div>
          <img th:if="${rankingBookCoverId != null}" class="book-cover" loading="lazy" th:src="${'https://covers.openlibrary.org/b/id/' + rankingBookCoverId + '-M.jpg'}" /><div th:if="${rankingBookCoverId == null}" class="book-cover-placeholder">?</div>
        </div>
      </button>
    </form>
    <form th:action="@{/choose}" method="POST">
      <input type="hidden" name="choice" value="existing" />
      <button type="submit" class="book-select-btn">
        <div class="book-entry">
          <div class="book-info">
            <div class="book-title" th:text="${comparisonBookTitle}"></div>
            <div th:if="${comparisonBookAuthor != null && !comparisonBookAuthor.isBlank()}" class="book-author" th:text="${comparisonBookAuthor}"></div>
          </div>
          <img th:if="${comparisonBookCoverId != null}" class="book-cover" loading="lazy" th:src="${'https://covers.openlibrary.org/b/id/' + comparisonBookCoverId + '-M.jpg'}" /><div th:if="${comparisonBookCoverId == null}" class="book-cover-placeholder">?</div>
        </div>
      </button>
    </form>
  </th:block>
</body>
</html>
