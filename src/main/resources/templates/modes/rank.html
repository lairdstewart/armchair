<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <th:block th:fragment="content">
    <h3>Which was better?</h3>
    <form th:action="@{/choose}" method="POST">
      <div class="book-entry-row" style="margin-bottom: 10px;">
        <button type="submit" name="choice" value="new" class="book-number rerank">►</button>
        <div class="book-entry">
          <div class="book-info">
            <div class="book-title">
              <a th:if="${rankingState.workOlidBeingRanked != null}" th:href="${'https://openlibrary.org/works/' + rankingState.workOlidBeingRanked}" target="_blank" th:text="${rankingState.titleBeingRanked}"></a>
              <a th:if="${rankingState.workOlidBeingRanked == null}" th:href="${'https://openlibrary.org/search?q=' + #uris.escapeQueryParam(rankingState.titleBeingRanked + ' ' + rankingState.authorBeingRanked)}" target="_blank" th:text="${rankingState.titleBeingRanked}"></a>
            </div>
            <div th:if="${rankingState.authorBeingRanked != null && !rankingState.authorBeingRanked.isBlank()}" class="book-author" th:text="${rankingState.authorBeingRanked}"></div>
          </div>
          <img th:if="${rankingBookCoverId != null}" class="book-cover" th:src="${'https://covers.openlibrary.org/b/id/' + rankingBookCoverId + '-M.jpg'}" /><div th:if="${rankingBookCoverId == null}" class="book-cover-placeholder">?</div>
        </div>
      </div>
      <div class="book-entry-row">
        <button type="submit" name="choice" value="existing" class="book-number rerank">►</button>
        <div class="book-entry">
          <div class="book-info">
            <div class="book-title">
              <a th:if="${comparisonBookWorkOlid != null}" th:href="${'https://openlibrary.org/works/' + comparisonBookWorkOlid}" target="_blank" th:text="${comparisonBookTitle}"></a>
              <a th:if="${comparisonBookWorkOlid == null}" th:href="${'https://openlibrary.org/search?q=' + #uris.escapeQueryParam(comparisonBookTitle + ' ' + comparisonBookAuthor)}" target="_blank" th:text="${comparisonBookTitle}"></a>
            </div>
            <div th:if="${comparisonBookAuthor != null && !comparisonBookAuthor.isBlank()}" class="book-author" th:text="${comparisonBookAuthor}"></div>
          </div>
          <img th:if="${comparisonBookCoverId != null}" class="book-cover" th:src="${'https://covers.openlibrary.org/b/id/' + comparisonBookCoverId + '-M.jpg'}" /><div th:if="${comparisonBookCoverId == null}" class="book-cover-placeholder">?</div>
        </div>
      </div>
    </form>
    <form th:action="@{/cancel-add}" method="POST" style="margin-top: 15px;">
      <button type="submit" class="book-action-link">[cancel]</button>
    </form>
  </th:block>
</body>
</html>
