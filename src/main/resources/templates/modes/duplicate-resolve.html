<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <th:block th:fragment="content">
    <h3>This book is already in your library</h3>
    <p><strong th:text="${duplicateResolveTitle}"></strong> is already ranked in your library.</p>
    <div style="margin-top: 15px;">
      <form th:action="@{/skip-duplicate-resolve}" method="POST" style="display: inline;">
        <button type="submit">Skip</button>
      </form>
      <form th:action="@{/rerank-duplicate-resolve}" method="POST" style="display: inline; margin-left: 10px;">
        <button type="submit">Re-rank</button>
      </form>
    </div>
  </th:block>
</body>
</html>
