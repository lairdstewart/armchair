<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <th:block th:fragment="content">
    <form th:action="${cameFromResolve} ? @{/back-to-resolve} : @{/cancel-add}" method="POST" style="margin-bottom: 0;">
      <button type="submit" class="btn-back">back</button>
    </form>
    <h3>Select the correct edition to add</h3>
    <p th:if="${isRankAll}" style="margin-bottom: 15px;"><span th:text="${rankAllRemaining}"></span> uncategorized book<span th:if="${rankAllRemaining != 1}">s</span> remaining</p>

    <!-- Standard flow: ► arrow per edition -->
    <th:block th:unless="${isRankAll}">
      <div th:each="edition : ${editionResults}" class="book-entry-row" style="margin-bottom: 10px;">
        <form th:action="@{/select-edition}" method="POST" style="display: inline;">
          <input type="hidden" name="editionOlid" th:value="${edition.editionOlid()}" />
          <input type="hidden" name="isbn13" th:value="${edition.isbn13()}" />
          <input type="hidden" name="title" th:value="${edition.title()}" />
          <input type="hidden" name="coverId" th:value="${edition.coverId()}" />
          <button type="submit" class="book-number rerank">►</button>
        </form>
        <div class="book-entry">
          <div class="book-info">
            <div class="book-title">
              <a th:href="${'https://openlibrary.org/books/' + edition.editionOlid()}" target="_blank" th:text="${edition.title()}"></a>
            </div>
            <div class="book-author">
              <span th:if="${edition.publisher() != null}" th:text="'Published by ' + ${edition.publisher()}"></span>
              <span th:if="${edition.publisher() != null && edition.publishDate() != null}"> in </span>
              <span th:if="${edition.publisher() == null && edition.publishDate() != null}">Published </span>
              <span th:if="${edition.publishDate() != null}" th:text="${edition.publishDate()}"></span>
            </div>
          </div>
          <img th:if="${edition.coverUrl() != null}" class="book-cover" loading="lazy" th:src="${edition.coverUrl()}" /><div th:if="${edition.coverUrl() == null}" class="book-cover-placeholder">?</div>
        </div>
      </div>
    </th:block>

    <!-- Categorize all flow: [rank] and [want to read] per edition -->
    <th:block th:if="${isRankAll}">
      <div th:each="edition : ${editionResults}" style="margin-bottom: 10px;">
        <div class="book-entry">
          <div class="book-info">
            <div class="book-title">
              <a th:href="${'https://openlibrary.org/books/' + edition.editionOlid()}" target="_blank" th:text="${edition.title()}"></a>
            </div>
            <div class="book-author">
              <span th:if="${edition.publisher() != null}" th:text="'Published by ' + ${edition.publisher()}"></span>
              <span th:if="${edition.publisher() != null && edition.publishDate() != null}"> in </span>
              <span th:if="${edition.publisher() == null && edition.publishDate() != null}">Published </span>
              <span th:if="${edition.publishDate() != null}" th:text="${edition.publishDate()}"></span>
            </div>
            <span class="book-actions">
              <form th:action="@{/select-edition}" method="POST" style="display: inline;">
                <input type="hidden" name="editionOlid" th:value="${edition.editionOlid()}" />
                <input type="hidden" name="isbn13" th:value="${edition.isbn13()}" />
                <input type="hidden" name="title" th:value="${edition.title()}" />
                <input type="hidden" name="coverId" th:value="${edition.coverId()}" />
                <input type="hidden" name="action" value="rank" />
                <button type="submit" class="book-action-link">[rank]</button>
              </form>
              <form th:action="@{/select-edition}" method="POST" style="display: inline;">
                <input type="hidden" name="editionOlid" th:value="${edition.editionOlid()}" />
                <input type="hidden" name="isbn13" th:value="${edition.isbn13()}" />
                <input type="hidden" name="title" th:value="${edition.title()}" />
                <input type="hidden" name="coverId" th:value="${edition.coverId()}" />
                <input type="hidden" name="action" value="want-to-read" />
                <button type="submit" class="book-action-link">[want to read]</button>
              </form>
            </span>
          </div>
          <img th:if="${edition.coverUrl() != null}" class="book-cover" loading="lazy" th:src="${edition.coverUrl()}" /><div th:if="${edition.coverUrl() == null}" class="book-cover-placeholder">?</div>
        </div>
      </div>
    </th:block>

    <div th:if="${editionTotalPages > 1}" style="margin-top: 15px;">
      <th:block th:each="page : ${#numbers.sequence(0, editionTotalPages - 1)}">
        <span th:if="${page == editionPage}" th:text="${(page * editionPageSize + 1) + '-' + T(java.lang.Math).min((page + 1) * editionPageSize, editionTotalCount)}" style="font-weight: bold; margin-right: 8px;"></span>
        <a th:if="${page != editionPage}" th:href="@{/rank/edition(page=${page})}" class="book-action-link"
           th:text="${'[' + (page * editionPageSize + 1) + '-' + T(java.lang.Math).min((page + 1) * editionPageSize, editionTotalCount) + ']'}" style="margin-right: 8px;"></a>
      </th:block>
    </div>
  </th:block>
</body>
</html>
