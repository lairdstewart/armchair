<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <th:block th:fragment="content">
    <form th:action="@{/cancel-add}" method="POST" style="margin-bottom: 0;">
      <button type="submit" class="btn-back">back</button>
    </form>
    <h3>Search for <span th:text="${rankingState.titleBeingRanked}"></span> in Open Library's database</h3>
    <p>Try searching with or without the author, or with a shorter version of the title.</p>
    <form th:action="@{/my-books}" method="GET" style="margin-bottom: 15px;">
      <input type="text" name="resolveQuery" th:value="${resolveQuery}" placeholder="Search Open Library..." style="width: 300px;" />
      <button type="submit">Search</button>
    </form>
    <div th:if="${resolveNoResults}" style="margin-bottom: 15px; color: #888;">
      No results found, try a different search.
    </div>
    <div th:if="${resolveResults != null && !resolveResults.isEmpty()}">
      <form th:each="result : ${resolveResults}" th:action="@{/resolve-book}" method="POST" class="book-entry-row" style="margin-bottom: 10px;">
        <input type="hidden" name="workOlid" th:value="${result.workOlid()}" />
        <input type="hidden" name="title" th:value="${result.title()}" />
        <input type="hidden" name="author" th:value="${result.author()}" />
        <input type="hidden" name="editionOlid" th:value="${result.editionOlid()}" />
        <input type="hidden" name="firstPublishYear" th:value="${result.firstPublishYear()}" />
        <input type="hidden" name="coverId" th:value="${result.coverId()}" />
        <button type="submit" class="book-number rerank">►</button>
        <div class="book-entry">
          <div class="book-info">
            <div class="book-title">
              <button type="submit" class="book-title-btn" th:text="${result.title()}"></button>
            </div>
            <div th:if="${result.author() != null && !result.author().isBlank()}" class="book-author" th:text="${result.author()}"></div>
          </div>
          <img th:if="${result.coverUrl() != null}" class="book-cover" loading="lazy" th:src="${result.coverUrl()}" /><div th:if="${result.coverUrl() == null}" class="book-cover-placeholder">?</div>
        </div>
      </form>
    </div>
    <form th:action="@{/abandon-resolve}" method="POST" style="margin-top: 15px;">
      <button type="submit" class="book-action-link">Skip this book</button>
    </form>
  </th:block>
</body>
</html>
