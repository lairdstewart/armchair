<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="page-content">
    <div th:switch="${mode.name()}">
      <div th:case="'LIST'">
        <!-- Type selector radio buttons - always show all 3 -->
        <div style="margin-bottom: 15px;">
          <label>
            <input type="radio" name="typeSelector" value="FICTION" th:checked="${selectedType == 'FICTION'}" onchange="window.location.href='/my-books?selectedType=FICTION'" />
            Fiction
          </label>
          <label style="margin-left: 15px;">
            <input type="radio" name="typeSelector" value="NONFICTION" th:checked="${selectedType == 'NONFICTION'}" onchange="window.location.href='/my-books?selectedType=NONFICTION'" />
            Non-Fiction
          </label>
          <label style="margin-left: 15px;">
            <input type="radio" name="typeSelector" value="WANT_TO_READ" th:checked="${selectedType == 'WANT_TO_READ'}" onchange="window.location.href='/my-books?selectedType=WANT_TO_READ'" />
            Want to Read
          </label>
        </div>

        <!-- Empty state message -->
        <p th:if="${selectedType == 'FICTION' && !hasFiction}">Add books via the search tab.</p>
        <p th:if="${selectedType == 'NONFICTION' && !hasNonfiction}">Add books via the search tab.</p>
        <p th:if="${selectedType == 'WANT_TO_READ' && !hasWantToRead}">Add books via the search tab.</p>

          <!-- Fiction books list -->
          <div th:if="${selectedType == 'FICTION' && hasFiction}">
            <ol class="book-list">
              <li th:each="book, iter : ${fictionBooks.liked()}">
                <span class="book-number liked" th:text="${iter.index + 1}"></span>
                <span th:if="${book.review() == null}">
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </span>
                <details th:if="${book.review() != null}" class="book-review">
                  <summary>
                    <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                    <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                    <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                    <span class="review-toggle"></span>
                  </summary>
                  <div class="review-text" th:text="${book.review()}"></div>
                </details>
                <span class="book-actions">
                  <form th:action="@{/direct-review}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[review]</button>
                  </form>
                  <form th:action="@{/direct-rerank}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[re-rank]</button>
                  </form>
                  <form th:action="@{/direct-remove}" method="POST" style="display: inline;" onsubmit="return confirm('Are you sure you want to remove this book?');">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[remove]</button>
                  </form>
                </span>
              </li>
              <li th:each="book, iter : ${fictionBooks.ok()}">
                <span class="book-number ok" th:text="${fictionBooks.liked().size() + iter.index + 1}"></span>
                <span th:if="${book.review() == null}">
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </span>
                <details th:if="${book.review() != null}" class="book-review">
                  <summary>
                    <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                    <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                    <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                    <span class="review-toggle"></span>
                  </summary>
                  <div class="review-text" th:text="${book.review()}"></div>
                </details>
                <span class="book-actions">
                  <form th:action="@{/direct-review}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[review]</button>
                  </form>
                  <form th:action="@{/direct-rerank}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[re-rank]</button>
                  </form>
                  <form th:action="@{/direct-remove}" method="POST" style="display: inline;" onsubmit="return confirm('Are you sure you want to remove this book?');">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[remove]</button>
                  </form>
                </span>
              </li>
              <li th:each="book, iter : ${fictionBooks.disliked()}">
                <span class="book-number disliked" th:text="${fictionBooks.liked().size() + fictionBooks.ok().size() + iter.index + 1}"></span>
                <span th:if="${book.review() == null}">
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </span>
                <details th:if="${book.review() != null}" class="book-review">
                  <summary>
                    <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                    <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                    <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                    <span class="review-toggle"></span>
                  </summary>
                  <div class="review-text" th:text="${book.review()}"></div>
                </details>
                <span class="book-actions">
                  <form th:action="@{/direct-review}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[review]</button>
                  </form>
                  <form th:action="@{/direct-rerank}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[re-rank]</button>
                  </form>
                  <form th:action="@{/direct-remove}" method="POST" style="display: inline;" onsubmit="return confirm('Are you sure you want to remove this book?');">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[remove]</button>
                  </form>
                </span>
              </li>
            </ol>
          </div>

          <!-- Non-Fiction books list -->
          <div th:if="${selectedType == 'NONFICTION' && hasNonfiction}">
            <ol class="book-list">
              <li th:each="book, iter : ${nonfictionBooks.liked()}">
                <span class="book-number liked" th:text="${iter.index + 1}"></span>
                <span th:if="${book.review() == null}">
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </span>
                <details th:if="${book.review() != null}" class="book-review">
                  <summary>
                    <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                    <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                    <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                    <span class="review-toggle"></span>
                  </summary>
                  <div class="review-text" th:text="${book.review()}"></div>
                </details>
                <span class="book-actions">
                  <form th:action="@{/direct-review}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[review]</button>
                  </form>
                  <form th:action="@{/direct-rerank}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[re-rank]</button>
                  </form>
                  <form th:action="@{/direct-remove}" method="POST" style="display: inline;" onsubmit="return confirm('Are you sure you want to remove this book?');">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[remove]</button>
                  </form>
                </span>
              </li>
              <li th:each="book, iter : ${nonfictionBooks.ok()}">
                <span class="book-number ok" th:text="${nonfictionBooks.liked().size() + iter.index + 1}"></span>
                <span th:if="${book.review() == null}">
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </span>
                <details th:if="${book.review() != null}" class="book-review">
                  <summary>
                    <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                    <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                    <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                    <span class="review-toggle"></span>
                  </summary>
                  <div class="review-text" th:text="${book.review()}"></div>
                </details>
                <span class="book-actions">
                  <form th:action="@{/direct-review}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[review]</button>
                  </form>
                  <form th:action="@{/direct-rerank}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[re-rank]</button>
                  </form>
                  <form th:action="@{/direct-remove}" method="POST" style="display: inline;" onsubmit="return confirm('Are you sure you want to remove this book?');">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[remove]</button>
                  </form>
                </span>
              </li>
              <li th:each="book, iter : ${nonfictionBooks.disliked()}">
                <span class="book-number disliked" th:text="${nonfictionBooks.liked().size() + nonfictionBooks.ok().size() + iter.index + 1}"></span>
                <span th:if="${book.review() == null}">
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </span>
                <details th:if="${book.review() != null}" class="book-review">
                  <summary>
                    <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                    <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                    <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                    <span class="review-toggle"></span>
                  </summary>
                  <div class="review-text" th:text="${book.review()}"></div>
                </details>
                <span class="book-actions">
                  <form th:action="@{/direct-review}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[review]</button>
                  </form>
                  <form th:action="@{/direct-rerank}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[re-rank]</button>
                  </form>
                  <form th:action="@{/direct-remove}" method="POST" style="display: inline;" onsubmit="return confirm('Are you sure you want to remove this book?');">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[remove]</button>
                  </form>
                </span>
              </li>
            </ol>
          </div>

          <!-- Want to Read books list -->
          <div th:if="${selectedType == 'WANT_TO_READ' && hasWantToRead}">
            <ol class="book-list">
              <li th:each="book, iter : ${wantToReadBooks}">
                <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                <span class="book-actions">
                  <form th:action="@{/mark-as-read}" method="POST" style="display: inline;">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[rank]</button>
                  </form>
                  <form th:action="@{/remove-from-reading-list}" method="POST" style="display: inline;" onsubmit="return confirm('Are you sure you want to remove this book?');">
                    <input type="hidden" name="bookId" th:value="${book.id()}" />
                    <button type="submit" class="book-action-link">[remove]</button>
                  </form>
                </span>
              </li>
            </ol>
          </div>
      </div>
      <div th:case="'CATEGORIZE'">
        <h3>Add <span th:text="${rankingState.titleBeingRanked}"></span></h3>
        <form th:action="@{/categorize}" method="POST">
          <div style="margin-bottom: 15px;">
            <label><input type="radio" name="type" value="fiction" required /> Fiction</label>
            <label style="margin-left: 15px;"><input type="radio" name="type" value="nonfiction" /> Non-Fiction</label>
          </div>
          <div style="margin-bottom: 15px;">
            <label><input type="radio" name="category" value="liked" required /> liked it</label>
            <label style="margin-left: 15px;"><input type="radio" name="category" value="ok" /> it was ok</label>
            <label style="margin-left: 15px;"><input type="radio" name="category" value="disliked" /> didn't like it</label>
          </div>
          <div style="margin-bottom: 15px;">
            <label for="review">Review (optional):</label><br />
            <textarea id="review" name="review" rows="4" cols="50" maxlength="5000" placeholder="Write your thoughts about this book..." th:text="${rankingState.reviewBeingRanked}"></textarea>
          </div>
          <button type="submit">Continue</button>
        </form>
      </div>
      <div th:case="'RANK'">
        <h3>Which is better?</h3>
        <form th:action="@{/choose}" method="POST">
          <div style="margin-bottom: 10px;">
            <button type="submit" name="choice" value="new" class="book-number rerank">-&gt;</button>
            <a th:if="${rankingState.googleBooksIdBeingRanked != null}" th:href="${'https://books.google.com/books?id=' + rankingState.googleBooksIdBeingRanked}" target="_blank" th:text="${rankingState.titleBeingRanked}"></a>
            <span th:if="${rankingState.googleBooksIdBeingRanked == null}" th:text="${rankingState.titleBeingRanked}"></span>
            <span th:if="${rankingState.authorBeingRanked != null && !rankingState.authorBeingRanked.isBlank()}" th:text="${', ' + rankingState.authorBeingRanked}"></span>
          </div>
          <div>
            <button type="submit" name="choice" value="existing" class="book-number rerank">-&gt;</button>
            <a th:if="${comparisonBookGoogleId != null}" th:href="${'https://books.google.com/books?id=' + comparisonBookGoogleId}" target="_blank" th:text="${comparisonBookTitle}"></a>
            <span th:if="${comparisonBookGoogleId == null}" th:text="${comparisonBookTitle}"></span>
            <span th:if="${comparisonBookAuthor != null && !comparisonBookAuthor.isBlank()}" th:text="${', ' + comparisonBookAuthor}"></span>
          </div>
        </form>
      </div>
      <div th:case="'REVIEW'">
        <h3>Review <span th:text="${reviewBook.title}"></span></h3>
        <form th:action="@{/save-review}" method="POST">
          <div style="margin-bottom: 15px;">
            <label><input type="radio" checked disabled /> <span th:text="${reviewBook.type.name() == 'FICTION' ? 'Fiction' : 'Non-Fiction'}"></span></label>
          </div>
          <div style="margin-bottom: 15px;">
            <label><input type="radio" checked disabled /> <span th:switch="${reviewBook.category.name()}">
              <span th:case="'LIKED'">liked it</span>
              <span th:case="'OK'">it was ok</span>
              <span th:case="'DISLIKED'">didn't like it</span>
            </span></label>
          </div>
          <div style="margin-bottom: 15px;">
            <label for="review">Review (optional):</label><br />
            <textarea id="review" name="review" rows="4" cols="50" maxlength="5000" placeholder="Write your thoughts about this book..." th:text="${reviewBook.review}"></textarea>
          </div>
          <button type="submit">Done</button>
        </form>
      </div>
    </div>
    </div>
  </body>
</html>
