<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Armchair</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div th:switch="${mode.name()}">
      <div th:case="'LIST'">
        <div style="display: flex; gap: 40px">
          <div style="flex: 1">
            <h3>Fiction</h3>
            <ol>
              <li th:each="book, iter : ${fictionBooks.liked()}">
                <span th:if="${rerankType != 'FICTION' && removeType != 'FICTION'}" class="book-number liked" th:text="${iter.index + 1}"></span>
                <form th:if="${rerankType == 'FICTION'}" th:action="@{/select-rerank-book}" method="POST" style="display: inline;">
                  <input type="hidden" name="bookId" th:value="${book.id()}" />
                  <button type="submit" class="book-number rerank">-&gt;</button>
                </form>
                <form th:if="${removeType == 'FICTION'}" th:action="@{/select-remove-book}" method="POST" style="display: inline;">
                  <input type="hidden" name="bookId" th:value="${book.id()}" />
                  <button type="submit" class="book-number remove">x</button>
                </form>
                <span>
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </span>
              </li>
              <li th:each="book, iter : ${fictionBooks.ok()}">
                <span th:if="${rerankType != 'FICTION' && removeType != 'FICTION'}" class="book-number ok" th:text="${fictionBooks.liked().size() + iter.index + 1}"></span>
                <form th:if="${rerankType == 'FICTION'}" th:action="@{/select-rerank-book}" method="POST" style="display: inline;">
                  <input type="hidden" name="bookId" th:value="${book.id()}" />
                  <button type="submit" class="book-number rerank">-&gt;</button>
                </form>
                <form th:if="${removeType == 'FICTION'}" th:action="@{/select-remove-book}" method="POST" style="display: inline;">
                  <input type="hidden" name="bookId" th:value="${book.id()}" />
                  <button type="submit" class="book-number remove">x</button>
                </form>
                <span>
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </span>
              </li>
              <li th:each="book, iter : ${fictionBooks.disliked()}">
                <span th:if="${rerankType != 'FICTION' && removeType != 'FICTION'}" class="book-number disliked" th:text="${fictionBooks.liked().size() + fictionBooks.ok().size() + iter.index + 1}"></span>
                <form th:if="${rerankType == 'FICTION'}" th:action="@{/select-rerank-book}" method="POST" style="display: inline;">
                  <input type="hidden" name="bookId" th:value="${book.id()}" />
                  <button type="submit" class="book-number rerank">-&gt;</button>
                </form>
                <form th:if="${removeType == 'FICTION'}" th:action="@{/select-remove-book}" method="POST" style="display: inline;">
                  <input type="hidden" name="bookId" th:value="${book.id()}" />
                  <button type="submit" class="book-number remove">x</button>
                </form>
                <span>
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </span>
              </li>
            </ol>

            <div style="display: flex; gap: 10px;">
              <form th:if="${rerankType != 'FICTION' && removeType != 'FICTION'}" th:action="@{/start-add}" method="POST">
                <input type="hidden" name="type" value="fiction" />
                <button type="submit">Add Book</button>
              </form>
              <form th:if="${rerankType != 'FICTION' && removeType != 'FICTION' && (!fictionBooks.liked().isEmpty() || !fictionBooks.ok().isEmpty() || !fictionBooks.disliked().isEmpty())}" th:action="@{/start-rerank}" method="POST">
                <input type="hidden" name="type" value="fiction" />
                <button type="submit">Re-Rank</button>
              </form>
              <form th:if="${rerankType != 'FICTION' && removeType != 'FICTION' && (!fictionBooks.liked().isEmpty() || !fictionBooks.ok().isEmpty() || !fictionBooks.disliked().isEmpty())}" th:action="@{/start-remove}" method="POST">
                <input type="hidden" name="type" value="fiction" />
                <button type="submit">Remove</button>
              </form>
            </div>
          </div>

          <div style="flex: 1">
            <h3>Non-Fiction</h3>
            <ol>
              <li th:each="book, iter : ${nonfictionBooks.liked()}">
                <span th:if="${rerankType != 'NONFICTION' && removeType != 'NONFICTION'}" class="book-number liked" th:text="${iter.index + 1}"></span>
                <form th:if="${rerankType == 'NONFICTION'}" th:action="@{/select-rerank-book}" method="POST" style="display: inline;">
                  <input type="hidden" name="bookId" th:value="${book.id()}" />
                  <button type="submit" class="book-number rerank">-&gt;</button>
                </form>
                <form th:if="${removeType == 'NONFICTION'}" th:action="@{/select-remove-book}" method="POST" style="display: inline;">
                  <input type="hidden" name="bookId" th:value="${book.id()}" />
                  <button type="submit" class="book-number remove">x</button>
                </form>
                <span>
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </span>
              </li>
              <li th:each="book, iter : ${nonfictionBooks.ok()}">
                <span th:if="${rerankType != 'NONFICTION' && removeType != 'NONFICTION'}" class="book-number ok" th:text="${nonfictionBooks.liked().size() + iter.index + 1}"></span>
                <form th:if="${rerankType == 'NONFICTION'}" th:action="@{/select-rerank-book}" method="POST" style="display: inline;">
                  <input type="hidden" name="bookId" th:value="${book.id()}" />
                  <button type="submit" class="book-number rerank">-&gt;</button>
                </form>
                <form th:if="${removeType == 'NONFICTION'}" th:action="@{/select-remove-book}" method="POST" style="display: inline;">
                  <input type="hidden" name="bookId" th:value="${book.id()}" />
                  <button type="submit" class="book-number remove">x</button>
                </form>
                <span>
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </span>
              </li>
              <li th:each="book, iter : ${nonfictionBooks.disliked()}">
                <span th:if="${rerankType != 'NONFICTION' && removeType != 'NONFICTION'}" class="book-number disliked" th:text="${nonfictionBooks.liked().size() + nonfictionBooks.ok().size() + iter.index + 1}"></span>
                <form th:if="${rerankType == 'NONFICTION'}" th:action="@{/select-rerank-book}" method="POST" style="display: inline;">
                  <input type="hidden" name="bookId" th:value="${book.id()}" />
                  <button type="submit" class="book-number rerank">-&gt;</button>
                </form>
                <form th:if="${removeType == 'NONFICTION'}" th:action="@{/select-remove-book}" method="POST" style="display: inline;">
                  <input type="hidden" name="bookId" th:value="${book.id()}" />
                  <button type="submit" class="book-number remove">x</button>
                </form>
                <span>
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </span>
              </li>
            </ol>

            <div style="display: flex; gap: 10px;">
              <form th:if="${rerankType != 'NONFICTION' && removeType != 'NONFICTION'}" th:action="@{/start-add}" method="POST">
                <input type="hidden" name="type" value="nonfiction" />
                <button type="submit">Add Book</button>
              </form>
              <form th:if="${rerankType != 'NONFICTION' && removeType != 'NONFICTION' && (!nonfictionBooks.liked().isEmpty() || !nonfictionBooks.ok().isEmpty() || !nonfictionBooks.disliked().isEmpty())}" th:action="@{/start-rerank}" method="POST">
                <input type="hidden" name="type" value="nonfiction" />
                <button type="submit">Re-Rank</button>
              </form>
              <form th:if="${rerankType != 'NONFICTION' && removeType != 'NONFICTION' && (!nonfictionBooks.liked().isEmpty() || !nonfictionBooks.ok().isEmpty() || !nonfictionBooks.disliked().isEmpty())}" th:action="@{/start-remove}" method="POST">
                <input type="hidden" name="type" value="nonfiction" />
                <button type="submit">Remove</button>
              </form>
            </div>
          </div>
        </div>
      </div>
      <div th:case="'ADD'">
        <h3>Add book</h3>
        <form th:action="@{/search-books}" method="POST">
          <input
            type="text"
            name="query"
            placeholder="Search for a book..."
            required
            autofocus
          />
          <button type="submit">Search</button>
        </form>
        <div th:if="${searchResults != null && !searchResults.isEmpty()}">
          <h4>Search Results:</h4>
          <div th:each="book : ${searchResults}" style="margin-bottom: 15px; padding: 10px; border: 1px solid #ccc;">
            <a th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" target="_blank"><strong th:text="${book.title()}"></strong></a>
            <span th:text="' by ' + ${book.author()}"></span>
            <form th:action="@{/select-book}" method="POST" style="display: inline; margin-left: 10px;">
              <input type="hidden" name="googleBooksId" th:value="${book.googleBooksId()}" />
              <input type="hidden" name="bookName" th:value="${book.title()}" />
              <input type="hidden" name="author" th:value="${book.author()}" />
              <button type="submit" class="add-book-btn">+</button>
            </form>
          </div>
        </div>
      </div>
      <div th:case="'CATEGORIZE'">
        <h3>How did you like <span th:text="${rankingState.titleBeingRanked}"></span>?</h3>
        <form th:action="@{/categorize}" method="POST">
          <button type="submit" name="category" value="liked">liked it</button>
          <button type="submit" name="category" value="ok">it was ok</button>
          <button type="submit" name="category" value="disliked">didn't like it</button>
        </form>
      </div>
      <div th:case="'RANK'">
        <h3>Which is better?</h3>
        <form th:action="@{/choose}" method="POST">
          <button
            type="submit"
            name="choice"
            value="new"
            th:text="${rankingState.titleBeingRanked}"
          ></button>
          <button
            type="submit"
            name="choice"
            value="existing"
            th:text="${comparisonBook}"
          ></button>
        </form>
      </div>
    </div>
  </body>
</html>
