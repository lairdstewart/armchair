<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>My Simple List</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div th:switch="${mode.name()}">
      <div th:case="'LIST'">
        <div style="display: flex; gap: 40px">
          <div style="flex: 1">
            <h3>Fiction</h3>
            <div th:if="${!fictionBooks.liked().isEmpty()}">
              <p>I liked...</p>
              <ol start="1">
                <li th:each="book : ${fictionBooks.liked()}">
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </li>
              </ol>
            </div>
            <div th:if="${!fictionBooks.ok().isEmpty()}">
              <p>I'm lukewarm on...</p>
              <ol th:start="${fictionBooks.liked().size() + 1}">
                <li th:each="book : ${fictionBooks.ok()}">
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </li>
              </ol>
            </div>
            <div th:if="${!fictionBooks.disliked().isEmpty()}">
              <p>I did not like...</p>
              <ol th:start="${fictionBooks.liked().size() + fictionBooks.ok().size() + 1}">
                <li th:each="book : ${fictionBooks.disliked()}">
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </li>
              </ol>
            </div>

            <form th:action="@{/start-add}" method="POST">
              <input type="hidden" name="type" value="fiction" />
              <button type="submit">Add Book</button>
            </form>
          </div>

          <div style="flex: 1">
            <h3>Non-Fiction</h3>
            <div th:if="${!nonfictionBooks.liked().isEmpty()}">
              <p>I liked...</p>
              <ol start="1">
                <li th:each="book : ${nonfictionBooks.liked()}">
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </li>
              </ol>
            </div>
            <div th:if="${!nonfictionBooks.ok().isEmpty()}">
              <p>I'm lukewarm on...</p>
              <ol th:start="${nonfictionBooks.liked().size() + 1}">
                <li th:each="book : ${nonfictionBooks.ok()}">
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </li>
              </ol>
            </div>
            <div th:if="${!nonfictionBooks.disliked().isEmpty()}">
              <p>I did not like...</p>
              <ol th:start="${nonfictionBooks.liked().size() + nonfictionBooks.ok().size() + 1}">
                <li th:each="book : ${nonfictionBooks.disliked()}">
                  <a th:if="${book.googleBooksId() != null}" th:href="${'https://books.google.com/books?id=' + book.googleBooksId()}" th:text="${book.title()}" target="_blank"></a>
                  <span th:if="${book.googleBooksId() == null}" th:text="${book.title()}"></span>
                  <span th:if="${book.author() != null && !book.author().isBlank()}" th:text="${', ' + book.author()}"></span>
                </li>
              </ol>
            </div>

            <form th:action="@{/start-add}" method="POST">
              <input type="hidden" name="type" value="nonfiction" />
              <button type="submit">Add Book</button>
            </form>
          </div>
        </div>
      </div>
      <div th:case="'ADD'">
        <form th:action="@{/cancel-add}" method="POST" style="margin-bottom: 10px;">
          <button type="submit">Back</button>
        </form>
        <h3>Add book</h3>
        <form th:action="@{/search-books}" method="POST">
          <input
            type="text"
            name="query"
            placeholder="Search for a book..."
            required
            autofocus
          />
          <button type="submit">Search</button>
        </form>
        <div th:if="${searchResults != null && !searchResults.isEmpty()}">
          <h4>Search Results:</h4>
          <div th:each="book : ${searchResults}" style="margin-bottom: 15px; padding: 10px; border: 1px solid #ccc;">
            <strong th:text="${book.title()}"></strong>
            <span th:text="' by ' + ${book.author()}"></span>
            <br>
            <form th:action="@{/categorize}" method="POST" style="display: inline;">
              <input type="hidden" name="googleBooksId" th:value="${book.googleBooksId()}" />
              <input type="hidden" name="bookName" th:value="${book.title()}" />
              <input type="hidden" name="author" th:value="${book.author()}" />
              <button type="submit" name="category" value="liked">liked it</button>
              <button type="submit" name="category" value="ok">it was ok</button>
              <button type="submit" name="category" value="disliked">didn't like it</button>
            </form>
          </div>
        </div>
      </div>
      <div th:case="'RANK'">
        <h3>Which is better?</h3>
        <form th:action="@{/choose}" method="POST">
          <button
            type="submit"
            name="choice"
            value="new"
            th:text="${rankingState.titleBeingRanked}"
          ></button>
          <button
            type="submit"
            name="choice"
            value="existing"
            th:text="${comparisonBook}"
          ></button>
        </form>
      </div>
    </div>
  </body>
</html>
